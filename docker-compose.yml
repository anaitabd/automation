services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-nexus_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      POSTGRES_DB: ${DB_NAME:-nexus}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus_user} -d ${DB_NAME:-nexus}"]
      interval: 5s
      timeout: 3s
      retries: 5

  setup-aws:
    build:
      context: .
      dockerfile: Dockerfile.setup
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./.env:/app/.env

  nexus-research:
    build:
      context: .
      args:
        LAMBDA_DIR: lambdas/nexus-research
    ports:
      - "9001:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-script:
    build:
      context: .
      args:
        LAMBDA_DIR: lambdas/nexus-script
    ports:
      - "9002:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_LAMBDA_FUNCTION_TIMEOUT=900
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-audio:
    build:
      context: .
      args:
        LAMBDA_DIR: lambdas/nexus-audio
    ports:
      - "9003:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_LAMBDA_FUNCTION_TIMEOUT=900
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-visuals:
    build:
      context: .
      dockerfile: lambdas/nexus-visuals/Dockerfile
    ports:
      - "9004:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - AWS_LAMBDA_FUNCTION_TIMEOUT=900
      - VISUALS_PARALLELISM=4
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-editor:
    build:
      context: .
      dockerfile: lambdas/nexus-editor/Dockerfile
    ports:
      - "9005:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - MEDIACONVERT_ROLE_ARN=${MEDIACONVERT_ROLE_ARN}
      - AWS_LAMBDA_FUNCTION_TIMEOUT=900
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-thumbnail:
    build:
      context: .
      args:
        LAMBDA_DIR: lambdas/nexus-thumbnail
    ports:
      - "9006:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-upload:
    build:
      context: .
      args:
        LAMBDA_DIR: lambdas/nexus-upload
    ports:
      - "9007:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - YOUTUBE_AUTO_PUBLISH=${YOUTUBE_AUTO_PUBLISH:-false}
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-notify:
    build:
      context: .
      args:
        LAMBDA_DIR: lambdas/nexus-notify
    ports:
      - "9008:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  nexus-api:
    build:
      context: .
      args:
        LAMBDA_DIR: lambdas/nexus-api
    ports:
      - "9009:8080"
    env_file: .env
    environment:
      - AWS_DEFAULT_REGION=${AWS_REGION:-us-east-1}
      - STATE_MACHINE_ARN=${STATE_MACHINE_ARN}
      - OUTPUTS_BUCKET=${OUTPUTS_BUCKET:-nexus-outputs}
    depends_on:
      setup-aws:
        condition: service_completed_successfully

  test-connections:
    build:
      context: .
      dockerfile: Dockerfile.setup
    env_file: .env
    entrypoint: ["python", "/app/scripts/test_connections.py"]
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - test

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.setup
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - ORCHESTRATOR_MODE=docker
      - ORCHESTRATOR_PORT=3000
      - DASHBOARD_PATH=/app/dashboard/index.html
    entrypoint: ["python", "/app/scripts/orchestrator.py"]
    volumes:
      - ./dashboard:/app/dashboard:ro
    depends_on:
      setup-aws:
        condition: service_completed_successfully

volumes:
  pg_data:
