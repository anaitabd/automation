<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusCloud — Serverless YouTube Pipeline</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0A0A0F',
            surface: '#12121A',
            raised: '#1A1A28',
            border: '#2A2A3F',
            'border-bright': '#3A3A55',
            'accent-blue': '#4F6EF7',
            'accent-purple': '#8B5CF6',
            'accent-cyan': '#22D3EE',
            'accent-green': '#10B981',
            'accent-amber': '#F59E0B',
            'accent-red': '#EF4444',
            'text-primary': '#F0F0FF',
            'text-secondary': '#9090B0',
            'text-muted': '#5A5A7A',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    }

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A0A0F; color: #F0F0FF; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0A0A0F; }
    ::-webkit-scrollbar-thumb { background: #2A2A3F; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #3A3A55; }
    @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
    .skeleton { background: linear-gradient(90deg, #12121A 25%, #1A1A28 50%, #12121A 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
    @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
    @keyframes slide-in-right { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes slide-out-right { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    .toast-enter { animation: slide-in-right 200ms ease-out forwards; }
    .toast-exit { animation: slide-out-right 200ms ease-in forwards; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fade-in 200ms ease-out; }
    @keyframes progress-bar { from { background-position: 0 0; } to { background-position: 30px 0; } }
    .progress-animated { background-image: linear-gradient(45deg, rgba(255,255,255,.08) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.08) 50%, rgba(255,255,255,.08) 75%, transparent 75%); background-size: 30px 30px; animation: progress-bar 1s linear infinite; }
    input:focus, textarea:focus, select:focus { outline: none; }
    video { border-radius: 8px; }
  </style>
  <script>window.__NEXUS_API_BASE__ = '%%NEXUS_API_BASE%%';</script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module">
/* ═══════════════════════════════════════════════════════════════════════════════
   NexusCloud Dashboard — Single-file React 18 Application
   All views: Channels, Channel Detail, Pipeline Monitor, System Status
   ═══════════════════════════════════════════════════════════════════════════════ */
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext } = React;

// ── API Base URL ─────────────────────────────────────────────────────────────
const API_BASE = window.__NEXUS_API_BASE__ || window.API_BASE_URL || '/api';
const api = async (path, opts = {}) => {
  const url = `${API_BASE}${path}`;
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    ...opts,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw { status: res.status, ...data };
  return data;
};

// ── Constants ────────────────────────────────────────────────────────────────
// Video-only pipeline: no Shorts branch
const VIDEO_PIPELINE_STEPS = [
  { id: 'Research', label: 'Research', type: 'lambda' },
  { id: 'Script', label: 'Script', type: 'lambda' },
  { id: 'AudioVisuals', label: 'Audio + Visuals', type: 'parallel', substeps: ['Audio', 'Visuals'] },
  { id: 'MergeParallelOutputs', label: 'Merge', type: 'pass', hidden: true },
  { id: 'Editor', label: 'Editor', type: 'lambda' },
  { id: 'Thumbnail', label: 'Thumbnail', type: 'lambda' },
  { id: 'Upload', label: 'Upload', type: 'lambda' },
  { id: 'Notify', label: 'Notify', type: 'lambda' },
];

// Shorts-only pipeline: no Editor, no Thumbnail
const SHORTS_PIPELINE_STEPS = [
  { id: 'Research', label: 'Research', type: 'lambda' },
  { id: 'Script', label: 'Script', type: 'lambda' },
  { id: 'AudioVisuals', label: 'Audio + Visuals', type: 'parallel', substeps: ['Audio', 'Visuals'] },
  { id: 'MergeParallelOutputs', label: 'Merge', type: 'pass', hidden: true },
  { id: 'Shorts', label: 'Shorts', type: 'lambda' },
  { id: 'Notify', label: 'Notify', type: 'lambda' },
];

// Combined pipeline: backward-compat for legacy runs (Editor ∥ Shorts)
const COMBINED_PIPELINE_STEPS = [
  { id: 'Research', label: 'Research', type: 'lambda' },
  { id: 'Script', label: 'Script', type: 'lambda' },
  { id: 'AudioVisuals', label: 'Audio + Visuals', type: 'parallel', substeps: ['Audio', 'Visuals'] },
  { id: 'MergeParallelOutputs', label: 'Merge', type: 'pass', hidden: true },
  { id: 'ContentAssembly', label: 'Assembly', type: 'parallel', substeps: ['Editor', 'Shorts'] },
  { id: 'MergeContentOutputs', label: 'Merge', type: 'pass', hidden: true },
  { id: 'Thumbnail', label: 'Thumbnail', type: 'lambda' },
  { id: 'Upload', label: 'Upload', type: 'lambda' },
  { id: 'Notify', label: 'Notify', type: 'lambda' },
];

// Flat reference kept for status parsing compatibility
const PIPELINE_STEPS = COMBINED_PIPELINE_STEPS;

// Pipeline type metadata (icon, label, gradient, description)
const PIPELINE_TYPE_META = {
  video:    { icon: '▶', label: 'Video', gradient: 'linear-gradient(135deg, #4F6EF7, #8B5CF6)', badge: 'bg-accent-blue/10 text-accent-blue border-accent-blue/30', description: 'Full-length video generation' },
  shorts:   { icon: '⚡', label: 'Shorts', gradient: 'linear-gradient(135deg, #22D3EE, #06B6D4)', badge: 'bg-accent-cyan/10 text-accent-cyan border-accent-cyan/30', description: 'Short-form vertical videos' },
  combined: { icon: '🎬', label: 'Combined', gradient: 'linear-gradient(135deg, #8B5CF6, #22D3EE)', badge: 'bg-accent-purple/10 text-accent-purple border-accent-purple/30', description: 'Video + Shorts in parallel' },
};

// Infer pipeline type from run data
function getPipelineType(runData) {
  if (!runData) return 'combined';
  if (runData.pipeline_type) return runData.pipeline_type;
  // Infer from flags
  const genShorts = runData.generate_shorts;
  const genVideo = runData.generate_video;
  if (genShorts === true && genVideo === false) return 'shorts';
  if (genShorts === false || genShorts === undefined) return 'video';
  // Check step names present in run for legacy inference
  const stepNames = (runData.steps || []).map(s => s.name);
  const hasEditor = stepNames.includes('Editor');
  const hasShorts = stepNames.includes('Shorts');
  if (hasEditor && hasShorts) return 'combined';
  if (hasShorts && !hasEditor) return 'shorts';
  if (hasEditor && !hasShorts) return 'video';
  return 'combined';
}

// Get the right step array for a pipeline type
function getPipelineSteps(pipelineType) {
  if (pipelineType === 'video') return VIDEO_PIPELINE_STEPS;
  if (pipelineType === 'shorts') return SHORTS_PIPELINE_STEPS;
  return COMBINED_PIPELINE_STEPS;
}

const COST_ESTIMATES = { base_video: 2.75, shorts: { micro: 0.28, short: 0.48, mid: 0.67, full: 0.86 } };
const SHORTS_TIERS = {
  micro: { duration: 15, sections: 1, nova_reel_clips: 2 },
  short: { duration: 30, sections: 3, nova_reel_clips: 4 },
  mid:   { duration: 45, sections: 4, nova_reel_clips: 5 },
  full:  { duration: 60, sections: 6, nova_reel_clips: 6 },
};

const PROFILES = {
  documentary:   { icon: '📽', label: 'Documentary', dur: '10–15 min', style: 'Cinematic' },
  finance:       { icon: '📈', label: 'Finance', dur: '8–14 min', style: 'Corporate clean' },
  entertainment: { icon: '⚡', label: 'Entertainment', dur: '6–12 min', style: 'High energy' },
};

const STATUS_COLORS = {
  active: { dot: 'bg-accent-green', text: 'text-accent-green', label: 'ACTIVE' },
  running: { dot: 'bg-accent-cyan', text: 'text-accent-cyan', label: 'RUNNING', pulse: true },
  setting_up: { dot: 'bg-accent-purple', text: 'text-accent-purple', label: 'SETTING UP', pulse: true },
  scheduled: { dot: 'bg-accent-amber', text: 'text-accent-amber', label: 'SCHEDULED' },
  idle: { dot: 'bg-text-muted', text: 'text-text-muted', label: 'IDLE' },
  error: { dot: 'bg-accent-red', text: 'text-accent-red', label: 'ERROR' },
  archived: { dot: 'bg-text-muted', text: 'text-text-muted', label: 'ARCHIVED' },
};

// ── Context ──────────────────────────────────────────────────────────────────
const AppContext = createContext();

// ── Notification (Toast) System ──────────────────────────────────────────────
function useNotifications() {
  const [notifications, setNotifications] = useState([]);
  const addNotification = useCallback((type, message) => {
    const id = Date.now() + Math.random();
    setNotifications(prev => [...prev.slice(-3), { id, type, message, exiting: false }]);
    setTimeout(() => {
      setNotifications(prev => prev.map(n => n.id === id ? { ...n, exiting: true } : n));
      setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 250);
    }, 5000);
  }, []);
  const removeNotification = useCallback((id) => {
    setNotifications(prev => prev.map(n => n.id === id ? { ...n, exiting: true } : n));
    setTimeout(() => setNotifications(prev => prev.filter(n => n.id !== id)), 250);
  }, []);
  return { notifications, addNotification, removeNotification };
}

function Toasts() {
  const { notifications, removeNotification } = useContext(AppContext);
  const icons = { success: '✅', error: '✖', warning: '⚠️', info: 'ℹ️' };
  const borders = { success: 'border-l-accent-green', error: 'border-l-accent-red', warning: 'border-l-accent-amber', info: 'border-l-accent-blue' };
  return (
    <div className="fixed bottom-4 right-4 z-[100] flex flex-col gap-2 max-w-sm">
      {notifications.map(n => (
        <div key={n.id} className={`${n.exiting ? 'toast-exit' : 'toast-enter'} bg-surface border border-border ${borders[n.type]} border-l-4 rounded-xl px-4 py-3 flex items-start gap-3 shadow-2xl`}>
          <span className="text-sm mt-0.5 shrink-0">{icons[n.type]}</span>
          <p className="text-sm text-text-primary flex-1">{n.message}</p>
          <button onClick={() => removeNotification(n.id)} className="text-text-muted hover:text-text-primary text-xs mt-0.5 shrink-0">✕</button>
        </div>
      ))}
    </div>
  );
}

// ── SSE Manager (polling-based) ──────────────────────────────────────────────
// API Gateway + Lambda cannot sustain long-lived SSE connections (29s timeout).
// This hook polls GET /status/{run_id} every 5s and dispatches synthetic events
// to keep the PipelineMonitor API unchanged.
function useSSE() {
  const [sseStatus, setSseStatus] = useState('connected');
  const connectionsRef = useRef({});  // runId → intervalId
  const prevDataRef = useRef({});     // runId → last status snapshot

  const connectSSE = useCallback((runId, onEvent) => {
    if (connectionsRef.current[runId]) {
      clearInterval(connectionsRef.current[runId]);
    }
    setSseStatus('connected');

    const poll = async () => {
      try {
        const data = await api(`/status/${runId}`);
        const prev = prevDataRef.current[runId];

        // Always dispatch a snapshot so the monitor stays updated
        onEvent('snapshot', data);
        setSseStatus('connected');

        // Detect step transitions
        if (prev && prev.current_step !== data.current_step && data.current_step) {
          if (data.current_step && (!prev.current_step || prev.status === 'RUNNING')) {
            onEvent('step_start', data);
          }
        }
        if (prev && prev.status === 'RUNNING' && data.status !== 'RUNNING') {
          onEvent('pipeline_done', data);
          clearInterval(connectionsRef.current[runId]);
          delete connectionsRef.current[runId];
          delete prevDataRef.current[runId];
          return;
        }

        prevDataRef.current[runId] = data;
      } catch {
        setSseStatus('unreachable');
      }
    };

    poll(); // immediate first poll
    connectionsRef.current[runId] = setInterval(poll, 5000);
  }, []);

  const disconnectSSE = useCallback((runId) => {
    if (connectionsRef.current[runId]) {
      clearInterval(connectionsRef.current[runId]);
      delete connectionsRef.current[runId];
      delete prevDataRef.current[runId];
    }
  }, []);

  const disconnectAll = useCallback(() => {
    Object.values(connectionsRef.current).forEach(id => clearInterval(id));
    connectionsRef.current = {};
    prevDataRef.current = {};
  }, []);

  const reconnect = useCallback(() => {
    setSseStatus('reconnecting');
  }, []);

  useEffect(() => () => disconnectAll(), []);
  return { sseStatus, connectSSE, disconnectSSE, reconnect, setSseStatus };
}

// ── Router ───────────────────────────────────────────────────────────────────
function useRouter() {
  const [route, setRoute] = useState(window.location.hash || '#/channels');
  useEffect(() => {
    const onHash = () => setRoute(window.location.hash || '#/channels');
    window.addEventListener('hashchange', onHash);
    if (!window.location.hash) window.location.hash = '#/channels';
    return () => window.removeEventListener('hashchange', onHash);
  }, []);
  const navigate = useCallback((hash) => { window.location.hash = hash; }, []);
  const match = useMemo(() => {
    const h = route;
    if (h.match(/^#\/channels\/([^/]+)$/)) return { view: 'channelDetail', id: h.split('/')[2] };
    if (h.match(/^#\/run\/(.+)$/)) return { view: 'pipelineMonitor', runId: h.replace('#/run/', '') };
    if (h === '#/status') return { view: 'status' };
    return { view: 'channels' };
  }, [route]);
  return { route, navigate, match };
}

// ── Utility components ───────────────────────────────────────────────────────
function Skeleton({ className }) {
  return <div className={`skeleton ${className}`}>&nbsp;</div>;
}

function StatusDot({ status }) {
  const cfg = STATUS_COLORS[status] || STATUS_COLORS.idle;
  return <span className={`inline-block w-2 h-2 rounded-full ${cfg.dot} ${cfg.pulse ? 'pulse-dot' : ''}`} />;
}

function Badge({ children, color = 'bg-raised text-text-secondary border-border' }) {
  return <span className={`inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold border ${color}`}>{children}</span>;
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  return (
    <button onClick={(e) => { e.stopPropagation(); navigator.clipboard.writeText(text); setCopied(true); setTimeout(() => setCopied(false), 1500); }}
      className="text-text-muted hover:text-text-primary transition-colors ml-1.5 text-xs">
      {copied ? '✓' : '⎘'}
    </button>
  );
}

function Toggle({ checked, onChange, label }) {
  return (
    <label className="flex items-center gap-3 cursor-pointer select-none">
      <div className={`relative w-10 h-[22px] rounded-full transition-colors ${checked ? 'bg-accent-blue' : 'bg-raised border border-border'}`} onClick={() => onChange(!checked)}>
        <div className={`absolute top-[3px] w-4 h-4 rounded-full transition-transform bg-white ${checked ? 'left-[22px]' : 'left-[3px]'}`} />
      </div>
      {label && <span className="text-sm text-text-secondary">{label}</span>}
    </label>
  );
}

function Modal({ children, onClose, width = 'max-w-lg' }) {
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center fade-in" onClick={onClose}>
      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" />
      <div className={`relative ${width} w-full mx-4 bg-surface border border-border rounded-2xl shadow-2xl max-h-[90vh] overflow-y-auto`} onClick={e => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

function Drawer({ children, onClose }) {
  return (
    <div className="fixed inset-0 z-50 flex justify-end fade-in" onClick={onClose}>
      <div className="absolute inset-0 bg-black/50 backdrop-blur-sm" />
      <div className="relative w-full max-w-[480px] bg-surface border-l border-border h-full overflow-y-auto shadow-2xl" style={{ animation: 'slide-in-right 250ms ease-out' }} onClick={e => e.stopPropagation()}>
        {children}
      </div>
    </div>
  );
}

function ProgressBar({ pct, animated = false }) {
  return (
    <div className="w-full h-1.5 rounded-full bg-raised overflow-hidden">
      <div className={`h-full rounded-full transition-all duration-500 ${animated ? 'progress-animated' : ''}`}
        style={{ width: `${Math.min(100, Math.max(0, pct))}%`, background: 'linear-gradient(90deg, #4F6EF7, #22D3EE)' }} />
    </div>
  );
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s / 60)}m ago`;
  if (s < 86400) return `${Math.floor(s / 3600)}h ago`;
  return `${Math.floor(s / 86400)}d ago`;
}

function fmtDuration(sec) {
  if (!sec && sec !== 0) return '';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function ColorSwatch({ color, label }) {
  return (
    <div className="flex items-center gap-3">
      <div className="w-8 h-5 rounded" style={{ backgroundColor: color }} />
      <span className="text-sm text-text-secondary">{label}</span>
      <span className="text-xs font-mono text-accent-cyan ml-auto">{color}</span>
    </div>
  );
}

// ── Sidebar ──────────────────────────────────────────────────────────────────
function Sidebar({ collapsed }) {
  const { navigate, match, activeRuns, sseStatus, reconnect, setDrawer } = useContext(AppContext);
  const runEntries = Object.entries(activeRuns).filter(([, r]) => r.status === 'RUNNING').slice(0, 5);

  const navItems = [
    { icon: '📺', label: 'Channels', hash: '#/channels', matchView: 'channels' },
    { icon: '▶', label: 'Pipeline', hash: '#/channels', matchView: 'pipelineMonitor' },
    { icon: '⚡', label: 'Shorts', hash: '#/channels', matchView: 'channels' },
    { icon: '🔧', label: 'System Status', hash: '#/status', matchView: 'status' },
  ];

  const sseColors = { connected: 'bg-accent-green', reconnecting: 'bg-accent-amber pulse-dot', unreachable: 'bg-accent-red' };
  const sseLabels = { connected: 'CONNECTED', reconnecting: 'RECONNECTING...', unreachable: 'UNREACHABLE' };

  return (
    <aside className={`hidden md:flex flex-col border-r border-border bg-surface h-screen sticky top-0 transition-all duration-200 ${collapsed ? 'w-16' : 'w-60'}`}>
      <div className={`px-4 py-5 border-b border-border ${collapsed ? 'text-center' : ''}`}>
        {collapsed ? (
          <span className="text-lg font-bold" style={{ background: 'linear-gradient(135deg, #4F6EF7, #8B5CF6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>⬡</span>
        ) : (
          <>
            <div className="font-bold tracking-tight flex items-center gap-2">
              <span style={{ background: 'linear-gradient(135deg, #4F6EF7, #8B5CF6)', WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent' }}>⬡</span>
              <span className="text-text-primary">NEXUSCLOUD</span>
            </div>
            <p className="text-[10px] text-text-muted mt-0.5 tracking-wide">Serverless YT Pipeline</p>
          </>
        )}
      </div>

      <nav className="flex-1 px-2 py-3 space-y-1">
        {navItems.map(item => {
          const active = match.view === item.matchView || (item.matchView === 'channels' && match.view === 'channelDetail');
          return (
            <button key={item.hash} onClick={() => navigate(item.hash)}
              className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl text-sm transition-colors ${active ? 'bg-raised text-text-primary' : 'text-text-secondary hover:text-text-primary hover:bg-raised/50'}`}>
              <span className="text-base">{item.icon}</span>
              {!collapsed && <span>{item.label}</span>}
              {active && !collapsed && <span className="ml-auto w-1.5 h-1.5 rounded-full bg-accent-blue" />}
            </button>
          );
        })}

        {!collapsed && (
          <button onClick={() => setDrawer('create-channel')} className="w-full mt-3 flex items-center justify-center gap-2 px-3 py-2 rounded-xl text-sm border border-dashed border-border text-text-muted hover:text-text-primary hover:border-border-bright transition-colors">
            <span>+</span> New Channel
          </button>
        )}
      </nav>

      {!collapsed && runEntries.length > 0 && (
        <div className="px-3 py-3 border-t border-border">
          <p className="text-[10px] font-medium text-text-muted uppercase tracking-widest mb-2">Active Runs</p>
          {runEntries.map(([id, run]) => {
            const ptMeta = PIPELINE_TYPE_META[run.pipeline_type] || PIPELINE_TYPE_META.combined;
            return (
            <button key={id} onClick={() => navigate(`#/run/${id}`)} className="w-full flex items-center gap-2 px-2 py-1.5 rounded-lg hover:bg-raised transition-colors text-xs group mb-1">
              <span className="w-1.5 h-1.5 rounded-full bg-accent-cyan pulse-dot" />
              <span className="shrink-0">{ptMeta.icon}</span>
              <span className="text-text-secondary truncate flex-1 text-left group-hover:text-text-primary">{id.slice(0, 12)}</span>
              <span className="text-text-muted">{run.progress_pct || 0}%</span>
            </button>
            );
          })}
        </div>
      )}

      <div className={`px-3 py-3 border-t border-border ${collapsed ? 'text-center' : 'flex items-center gap-2'}`}>
        <span className={`inline-block w-2 h-2 rounded-full ${sseColors[sseStatus]}`} />
        {!collapsed && (
          <>
            <span className="text-[10px] text-text-muted uppercase tracking-wider">{sseLabels[sseStatus]}</span>
            {sseStatus === 'unreachable' && <button onClick={reconnect} className="ml-auto text-[10px] text-accent-blue hover:underline">Retry</button>}
            <span className="ml-auto text-[10px] text-text-muted">v2.0.0</span>
          </>
        )}
      </div>
    </aside>
  );
}

// ── Mobile Bottom Nav ────────────────────────────────────────────────────────
function MobileNav() {
  const { navigate, match } = useContext(AppContext);
  const items = [

// CHANNEL SETUP WIZARD
// ═════════════════════════════════════════════════════════════════════════════
function ChannelSetupWizard({ channelId, onComplete }) {
  const { addNotification } = useContext(AppContext);
  const [channel, setChannel] = useState(null);
  const [triggering, setTriggering] = useState(false);
  const [triggered, setTriggered] = useState(false);

  // Poll channel every 3s while setting_up
  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      try {
        const data = await api(`/channel/${channelId}`);
        if (!cancelled) {
          setChannel(data.channel || data);
          if ((data.channel || data)?.stats?.status !== 'setting_up') {
            onComplete && onComplete(data.channel || data);
          }
        }
      } catch {}
    };
    poll();
    const iv = setInterval(poll, 3000);
    return () => { cancelled = true; clearInterval(iv); };
  }, [channelId]);

  const handleTrigger = async () => {
    setTriggering(true);
    try {
      await api(`/channel/${channelId}/setup`, { method: 'POST' });
      setTriggered(true);
      addNotification('info', 'Channel setup started');
    } catch (err) {
      addNotification('error', `Setup trigger failed: ${err.error || 'Unknown error'}`);
    } finally { setTriggering(false); }
  };

  const ch = channel;
  const brand = ch?.brand || {};
  const hasBrand = Boolean(brand.primary_color);
  const hasLogo = Boolean(brand.logo_s3);
  const hasIntro = Boolean(brand.intro_s3);
  const hasVoice = Boolean(ch?.voice_id);

  const steps = [
    { label: 'Brand Design', sublabel: 'AI generates color palette, font & LUT', done: hasBrand, icon: '🎨' },
    { label: 'Logo Generation', sublabel: 'Nova Canvas creates channel logo', done: hasLogo, icon: '🖼️' },
    { label: 'Intro / Outro', sublabel: 'Nova Reel renders bumpers', done: hasIntro, icon: '🎬' },
    { label: 'Voice Setup', sublabel: 'Select your ElevenLabs narrator voice', done: hasVoice, icon: '🎙️' },
  ];

  const doneCount = steps.filter(s => s.done).length;
  const allDone = doneCount === steps.length;

  return (
    <div className="space-y-6 max-w-2xl">
      <div className="border border-accent-purple/30 rounded-2xl bg-accent-purple/5 p-5">
        <div className="flex items-center justify-between mb-4">
          <div>
            <h3 className="text-sm font-semibold text-text-primary">Channel Setup In Progress</h3>
            <p className="text-xs text-text-muted mt-0.5">AI is building your brand identity — this takes ~2-3 minutes</p>
          </div>
          <span className="text-xs font-mono text-accent-purple">{doneCount}/{steps.length}</span>
        </div>

        {/* Progress bar */}
        <div className="w-full bg-raised rounded-full h-1.5 mb-5">
          <div className="h-1.5 rounded-full bg-accent-purple transition-all duration-700" style={{ width: `${(doneCount / steps.length) * 100}%` }} />
        </div>

        <div className="space-y-3">
          {steps.map((s, i) => (
            <div key={i} className={`flex items-start gap-3 p-3 rounded-xl transition-colors ${s.done ? 'bg-accent-green/5 border border-accent-green/20' : i === doneCount ? 'bg-accent-purple/10 border border-accent-purple/20' : 'bg-raised/30 border border-border/50'}`}>
              <span className="text-base mt-0.5">{s.icon}</span>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <span className={`text-sm font-medium ${s.done ? 'text-accent-green' : i === doneCount ? 'text-text-primary' : 'text-text-muted'}`}>{s.label}</span>
                  {s.done && <span className="text-accent-green text-xs">✓</span>}
                  {!s.done && i === doneCount && <span className="inline-block w-3 h-3 rounded-full bg-accent-purple animate-pulse" />}
                </div>
                <p className="text-[11px] text-text-muted">{s.sublabel}</p>
              </div>
            </div>
          ))}
        </div>

        {!triggered && !hasBrand && (
          <button onClick={handleTrigger} disabled={triggering}
            className="mt-4 px-5 py-2 rounded-xl text-sm font-semibold text-white disabled:opacity-40 hover:opacity-90 transition-opacity"
            style={{ background: 'linear-gradient(135deg, #8B5CF6, #6366F1)' }}>
            {triggering ? 'Starting...' : '▶ Start Setup Now'}
          </button>
        )}
      </div>

      {/* Brand preview when ready */}
      {hasBrand && (
        <div className="border border-border rounded-2xl bg-surface p-5">
          <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest mb-4">Brand Kit Preview</h3>
          <div className="flex items-center gap-4 mb-4">
            <div className="w-16 h-16 rounded-xl overflow-hidden flex items-center justify-center border border-border" style={{ background: `linear-gradient(135deg, ${brand.primary_color || '#4F6EF7'}, ${brand.accent_color || '#8B5CF6'})` }}>
              {hasLogo ? (
                <img src={brand.logo_url || ''} alt="Logo" className="w-full h-full object-contain p-2" />
              ) : (
                <span className="text-white font-bold text-lg">{(ch?.name || 'N').split(' ').map(w => w[0]).join('').slice(0, 2)}</span>
              )}
            </div>
            <div>
              <div className="flex gap-2 mb-1">
                {[brand.primary_color, brand.secondary_color, brand.accent_color].filter(Boolean).map((c, i) => (
                  <div key={i} className="w-6 h-6 rounded-full border border-border/50" style={{ background: c }} title={c} />
                ))}
              </div>
              <p className="text-xs text-text-muted">Font: <span className="text-text-secondary">{brand.font || '—'}</span></p>
              <p className="text-xs text-text-muted">LUT: <span className="text-accent-cyan font-mono">{brand.lut_preset || '—'}</span></p>
            </div>
          </div>
          {hasIntro && (
            <div className="mb-3">
              <p className="text-[10px] text-text-muted uppercase tracking-widest mb-1.5">Intro</p>
              <video controls preload="none" className="w-full rounded-lg bg-black" style={{ maxHeight: '100px' }}>
                <source src={brand.intro_url || ''} type="video/mp4" />
              </video>
            </div>
          )}
        </div>
      )}

      {/* Voice picker — always shown during setup, even if brand is done */}
      <VoicePicker channelId={channelId} currentVoiceId={ch?.voice_id} />
    </div>
  );
}

// ── Voice Picker ─────────────────────────────────────────────────────────────
function VoicePicker({ channelId, currentVoiceId }) {
  const { addNotification } = useContext(AppContext);
  const [voices, setVoices] = useState([]);
  const [loading, setLoading] = useState(false);
  const [selected, setSelected] = useState(currentVoiceId || null);
  const [saving, setSaving] = useState(false);
  const [playing, setPlaying] = useState(null);
  const [filter, setFilter] = useState('');
  const audioRef = React.useRef(null);

  useEffect(() => { setSelected(currentVoiceId || null); }, [currentVoiceId]);

  const loadVoices = async () => {
    setLoading(true);
    try {
      const data = await api('/channel/voices');
      setVoices(data.voices || []);
    } catch (err) {
      addNotification('error', `Failed to load voices: ${err.error || 'Unknown error'}`);
    } finally { setLoading(false); }
  };

  const handlePlay = (voice) => {
    if (playing === voice.voice_id) {
      audioRef.current?.pause();
      setPlaying(null);
      return;
    }
    if (audioRef.current) { audioRef.current.pause(); }
    if (voice.preview_url) {
      audioRef.current = new Audio(voice.preview_url);
      audioRef.current.play().catch(() => {});
      audioRef.current.onended = () => setPlaying(null);
      setPlaying(voice.voice_id);
    }
  };

  const handleSave = async () => {
    if (!selected) return;
    setSaving(true);
    try {
      await api(`/channel/${channelId}/brand`, { method: 'PUT', body: JSON.stringify({ voice_id: selected }) });
      addNotification('success', 'Voice saved successfully');
    } catch (err) {
      addNotification('error', `Failed to save voice: ${err.error || 'Unknown error'}`);
    } finally { setSaving(false); }
  };

  const filtered = voices.filter(v =>
    !filter || v.name.toLowerCase().includes(filter.toLowerCase()) ||
    Object.values(v.labels || {}).some(l => String(l).toLowerCase().includes(filter.toLowerCase()))
  );

  return (
    <div className="border border-border rounded-2xl bg-surface p-5">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest">Voice Selection</h3>
          {currentVoiceId && <p className="text-xs text-accent-cyan font-mono mt-0.5">Current: {currentVoiceId}</p>}
        </div>
        {voices.length === 0 ? (
          <button onClick={loadVoices} disabled={loading}
            className="px-4 py-1.5 rounded-xl text-xs font-semibold border border-accent-blue/30 text-accent-blue hover:bg-accent-blue/10 transition-colors disabled:opacity-40">
            {loading ? 'Loading...' : '🎙️ Load Voices'}
          </button>
        ) : (
          <span className="text-xs text-text-muted">{voices.length} voices</span>
        )}
      </div>

      {voices.length > 0 && (
        <>
          <input type="text" value={filter} onChange={e => setFilter(e.target.value)}
            placeholder="Filter by name, accent, gender..."
            className="w-full px-3 py-2 rounded-xl bg-bg border border-border text-sm text-text-primary placeholder:text-text-muted focus:border-accent-blue mb-3" />

          <div className="space-y-2 max-h-72 overflow-y-auto pr-1">
            {filtered.map(v => (
              <div key={v.voice_id}
                onClick={() => setSelected(v.voice_id)}
                className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer border transition-all ${selected === v.voice_id ? 'border-accent-blue bg-accent-blue/10' : 'border-border hover:border-border-bright hover:bg-raised/50'}`}>
                <button onClick={e => { e.stopPropagation(); handlePlay(v); }}
                  className={`shrink-0 w-8 h-8 rounded-full flex items-center justify-center text-sm border transition-colors ${playing === v.voice_id ? 'bg-accent-cyan/20 border-accent-cyan text-accent-cyan' : 'bg-raised border-border text-text-muted hover:text-text-primary'}`}
                  title="Preview voice">
                  {playing === v.voice_id ? '⏸' : '▶'}
                </button>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2">
                    <span className="text-sm font-medium text-text-primary truncate">{v.name}</span>
                    {selected === v.voice_id && <span className="text-accent-blue text-xs shrink-0">✓</span>}
                  </div>
                  {v.labels && Object.keys(v.labels).length > 0 && (
                    <div className="flex gap-1.5 mt-1 flex-wrap">
                      {Object.entries(v.labels).slice(0, 4).map(([k, val]) => (
                        <span key={k} className="px-1.5 py-0.5 rounded text-[10px] bg-raised border border-border text-text-muted capitalize">{val}</span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            ))}
            {filtered.length === 0 && <p className="text-sm text-text-muted text-center py-3">No voices match "{filter}"</p>}
          </div>

          {selected && (
            <div className="mt-4 pt-4 border-t border-border flex items-center justify-between">
              <span className="text-xs text-text-muted">Selected: <span className="text-text-primary font-mono">{voices.find(v => v.voice_id === selected)?.name || selected}</span></span>
              <button onClick={handleSave} disabled={saving || selected === currentVoiceId}
                className="px-4 py-2 rounded-xl text-xs font-semibold text-white disabled:opacity-40 hover:opacity-90 transition-opacity"
                style={{ background: 'linear-gradient(135deg, #4F6EF7, #8B5CF6)' }}>
                {saving ? 'Saving...' : selected === currentVoiceId ? 'Already Set' : 'Save Voice'}
              </button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ═════════════════════════════════════════════════════════════════════════════
// VIEW 3 — CHANNEL DETAIL
// ═════════════════════════════════════════════════════════════════════════════
function ChannelDetail({ channelId }) {
  const { navigate, setModal, setModalChannel, addNotification } = useContext(AppContext);
  const [channel, setChannel] = useState(null);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState('overview');
  const [videos, setVideos] = useState([]);
  const [videosLoading, setVideosLoading] = useState(false);

  const loadChannel = React.useCallback(async (silent = false) => {
    if (!silent) setLoading(true);
    try {
      const data = await api(`/channel/${channelId}`);
      setChannel(data.channel || data);
    } catch {
      if (!silent) addNotification('error', 'Failed to load channel');
    } finally {
      if (!silent) setLoading(false);
    }
  }, [channelId]);

  useEffect(() => { loadChannel(); }, [loadChannel]);

  useEffect(() => {
    if (tab === 'videos' && channel) {
      setVideosLoading(true);
      api(`/channel/${channelId}/videos`).then(data => setVideos(data.videos || data || [])).catch(() => {}).finally(() => setVideosLoading(false));
    }
  }, [tab, channelId, channel]);

  if (loading) {
    return (
      <div className="p-6">
        <Skeleton className="h-8 w-48 mb-4" />
        <div className="border border-border rounded-2xl bg-surface p-6 mb-6">
          <div className="flex items-center gap-4"><Skeleton className="w-20 h-20 rounded-full" /><div><Skeleton className="h-6 w-48 mb-2" /><Skeleton className="h-4 w-32" /></div></div>
          <div className="grid grid-cols-2 gap-4"><Skeleton className="h-40" /><Skeleton className="h-40" /></div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
          <Skeleton className="h-40" />
          <Skeleton className="h-40" />
          <Skeleton className="h-40" />
        </div>
      </div>
    );
  }

  if (!channel) {
    return <div className="p-6 text-center"><p className="text-text-muted">Channel not found</p><button onClick={() => navigate('#/channels')} className="mt-4 text-accent-blue hover:underline text-sm">← Back to channels</button></div>;
  }

  const ch = channel;
  const status = ch.stats?.status || 'idle';
  const statusCfg = STATUS_COLORS[status] || STATUS_COLORS.idle;
  const initials = (ch.name || 'NC').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  const tabs = ['overview', 'videos', 'shorts', 'settings'];

  return (
    <div className="p-4 md:p-6">
      <button onClick={() => navigate('#/channels')} className="text-sm text-text-muted hover:text-text-primary mb-4 inline-flex items-center gap-1 transition-colors">← Back to channels</button>

      <div className="border border-border rounded-2xl bg-surface p-5 mb-6">
        <div className="flex flex-col md:flex-row md:items-center gap-4 mb-4">
          <div className="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-bold shrink-0" style={{ background: `linear-gradient(135deg, ${ch.brand?.primary_color || '#4F6EF7'}, ${ch.brand?.accent_color || '#8B5CF6'})` }}>
            {initials}
          </div>
          <div className="flex-1 min-w-0">
            <div className="flex items-center gap-3 flex-wrap">
              <h1 className="text-xl font-bold text-text-primary">{ch.name}</h1>
              <div className="flex items-center gap-1.5"><StatusDot status={status} /><span className={`text-[10px] font-medium uppercase tracking-wider ${statusCfg.text}`}>{statusCfg.label}</span></div>
            </div>
            <p className="text-sm text-text-muted mt-0.5">{ch.niche} · {ch.profile}</p>
          </div>
          <div className="flex gap-2 shrink-0 flex-wrap">
            <button onClick={() => { setModalChannel(ch); setModal('generate-video'); }} className="px-4 py-2 rounded-xl text-xs font-semibold text-white hover:opacity-90 transition-opacity" style={{ background: 'linear-gradient(135deg, #4F6EF7, #8B5CF6)' }}>▶ Generate Video</button>
            <button onClick={() => { setModalChannel(ch); setModal('generate-shorts'); }} className="px-4 py-2 rounded-xl text-xs font-semibold text-accent-cyan border border-accent-cyan/30 bg-accent-cyan/5 hover:bg-accent-cyan/10 transition-colors">⚡ Generate Shorts</button>
          </div>
        </div>

        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
          {[
            { label: 'Videos', value: ch.stats?.videos_generated || 0 },
            { label: 'Shorts', value: (ch.stats?.videos_generated || 0) * 4 },
            { label: 'Runs', value: (ch.stats?.videos_generated || 0) + Math.floor((ch.stats?.videos_generated || 0) * 0.3) },
            { label: 'Status', value: statusCfg.label, color: statusCfg.text },
          ].map(s => (
            <div key={s.label} className="bg-raised/50 rounded-xl p-3">
              <p className="text-[10px] text-text-muted uppercase tracking-wider">{s.label}</p>
              <p className={`text-lg font-bold ${s.color || 'text-text-primary'}`}>{s.value}</p>
            </div>
          ))}
        </div>
      </div>

      <div className="flex gap-1 mb-6 border-b border-border pb-px overflow-x-auto">
        {tabs.map(t => (
          <button key={t} onClick={() => setTab(t)} className={`px-4 py-2.5 text-sm font-medium capitalize whitespace-nowrap transition-colors border-b-2 -mb-px ${tab === t ? 'border-accent-blue text-text-primary' : 'border-transparent text-text-muted hover:text-text-primary'}`}>{t}</button>
        ))}
      </div>

      {status === 'setting_up' ? (
        <ChannelSetupWizard channelId={channelId} onComplete={() => loadChannel()} />
      ) : (
        <>
          {tab === 'overview' && <OverviewTab channel={ch} />}
          {tab === 'videos' && <VideosTab channel={ch} videos={videos} loading={videosLoading} />}
          {tab === 'shorts' && <ShortsTab channel={ch} />}
          {tab === 'settings' && <SettingsTab channel={ch} onUpdated={() => loadChannel(true)} />}
        </>
      )}
    </div>
  );
}

// ── Videos Tab ────────────────────────────────────────────────────────────────
function VideosTab({ channel, videos, loading }) {
  const { navigate, addNotification } = useContext(AppContext);
  const [page, setPage] = useState(0);
  const perPage = 10;
  const paged = videos.slice(page * perPage, (page + 1) * perPage);
  const totalPages = Math.ceil(videos.length / perPage);

  const handleResume = async (runId) => {
    try {
      const res = await api('/resume', { method: 'POST', body: JSON.stringify({ run_id: runId }) });
      addNotification('info', `Resuming pipeline from ${res.resume_from || 'auto-detected step'}`);
      navigate(`#/run/${res.run_id}`);
    } catch (err) {
      addNotification('error', `Resume failed: ${err.error || 'Unknown error'}`);
    }
  };

  if (loading) {
    return (
      <div className="space-y-3">
        {[1,2,3,4,5].map(i => (
          <div key={i} className="border border-border rounded-xl bg-surface p-4 flex gap-4">
            <Skeleton className="w-24 h-14 shrink-0" />
            <div className="flex-1"><Skeleton className="h-4 w-3/4 mb-2" /><Skeleton className="h-3 w-1/2" /></div>
          </div>
        ))}
      </div>
    );
  }

  if (videos.length === 0) {
    return <div className="text-center py-16"><p className="text-text-muted">No videos yet for this channel</p></div>;
  }

  const statusBadge = (s) => {
    const m = {
      published: 'bg-accent-green/10 text-accent-green border-accent-green/30',
      processing: 'bg-accent-amber/10 text-accent-amber border-accent-amber/30',
      failed: 'bg-accent-red/10 text-accent-red border-accent-red/30',
      pending_approval: 'bg-accent-purple/10 text-accent-purple border-accent-purple/30',
    };
    return m[s] || 'bg-raised text-text-muted border-border';
  };

  return (
    <div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead><tr className="border-b border-border">
            <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-3 px-3">Title</th>
            <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-3 px-3 hidden md:table-cell">Duration</th>
            <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-3 px-3">Status</th>
            <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-3 px-3 hidden lg:table-cell">Run ID</th>
            <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-3 px-3 hidden md:table-cell">Date</th>
            <th className="text-right text-[10px] text-text-muted uppercase tracking-widest py-3 px-3">Actions</th>
          </tr></thead>
          <tbody>
            {paged.map((v, i) => (
              <tr key={i} className="border-b border-border/50 hover:bg-raised/30 transition-colors">
                <td className="py-3 px-3"><p className="text-text-primary font-medium truncate max-w-[200px]">{v.title || 'Untitled'}</p></td>
                <td className="py-3 px-3 hidden md:table-cell text-text-muted">{v.duration ? fmtDuration(v.duration) : '—'}</td>
                <td className="py-3 px-3"><Badge color={statusBadge(v.status)}>{(v.status || 'unknown').replace('_', ' ')}</Badge></td>
                <td className="py-3 px-3 hidden lg:table-cell"><span className="font-mono text-xs text-accent-cyan">{(v.run_id || '').slice(0, 12)}</span></td>
                <td className="py-3 px-3 hidden md:table-cell text-text-muted text-xs">{v.date ? timeAgo(v.date) : '—'}</td>
                <td className="py-3 px-3 text-right">
                  <div className="flex gap-1 justify-end">
                    {v.run_id && <button onClick={() => navigate(`#/run/${v.run_id}`)} className="px-2 py-1 rounded-lg text-xs text-text-muted hover:text-text-primary hover:bg-raised transition-colors">View</button>}
                    {v.status === 'failed' && v.run_id && <button onClick={() => handleResume(v.run_id)} className="px-2 py-1 rounded-lg text-xs text-accent-blue hover:bg-accent-blue/10 transition-colors">Resume</button>}
                    {v.status === 'pending_approval' && <button onClick={() => addNotification('info', 'Approve & Publish flow initiated')} className="px-2 py-1 rounded-lg text-xs text-accent-green hover:bg-accent-green/10 transition-colors">Publish</button>}
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {totalPages > 1 && (
        <div className="flex items-center justify-center gap-2 mt-4">
          <button onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0} className="px-3 py-1.5 rounded-lg text-xs text-text-muted hover:text-text-primary disabled:opacity-30 border border-border">Prev</button>
          <span className="text-xs text-text-muted">{page + 1} / {totalPages}</span>
          <button onClick={() => setPage(Math.min(totalPages - 1, page + 1))} disabled={page >= totalPages - 1} className="px-3 py-1.5 rounded-lg text-xs text-text-muted hover:text-text-primary disabled:opacity-30 border border-border">Next</button>
        </div>
      )}
    </div>
  );
}

// ── Shorts Tab ────────────────────────────────────────────────────────────────
function ShortsTab({ channel }) {
  const [shorts, setShorts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tierFilter, setTierFilter] = useState('all');

  useEffect(() => {
    const load = async () => {
      setLoading(true);
      try {
        if (channel.stats?.last_run_id) {
          const data = await api(`/outputs/${channel.stats.last_run_id}`);
          const manifestUrl = data.urls?.[`${channel.stats.last_run_id}/shorts/manifest.json`];
          if (manifestUrl) {
            const manifest = await fetch(manifestUrl).then(r => r.json());
            setShorts(manifest.shorts || []);
          }
        }
      } catch {} finally { setLoading(false); }
    };
    load();
  }, [channel]);

  const filtered = tierFilter === 'all' ? shorts : shorts.filter(s => s.tier === tierFilter);

  if (loading) {
    return (
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
        {[1,2,3,4].map(i => <div key={i} className="border border-border rounded-2xl bg-surface overflow-hidden"><Skeleton className="aspect-[9/16]" /></div>)}
      </div>
    );
  }

  return (
    <div>
      <div className="flex gap-2 mb-4 overflow-x-auto pb-2">
        {['all', 'micro', 'short', 'mid', 'full'].map(t => (
          <button key={t} onClick={() => setTierFilter(t)}

// VIEW 5 — PIPELINE MONITOR
// ═════════════════════════════════════════════════════════════════════════════
function PipelineMonitor({ runId }) {
  const { navigate, addNotification, connectSSE, disconnectSSE, setActiveRun } = useContext(AppContext);
  const [runData, setRunData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [logs, setLogs] = useState([]);
  const [logsOpen, setLogsOpen] = useState(false);
  const [outputs, setOutputs] = useState(null);
  const logRef = useRef(null);

  // Load initial status from GET /status/{run_id}
  useEffect(() => {
    let cancelled = false;
    const load = async () => {
      setLoading(true);
      try {
        const data = await api(`/status/${runId}`);
        if (!cancelled) {
          setRunData(data);
          setActiveRun(runId, { status: data.status, progress_pct: data.progress_pct, step: data.current_step });
        }
      } catch (err) {
        if (!cancelled) addNotification('error', `Failed to load run: ${err.error || 'Unknown error'}`);
      } finally {
        if (!cancelled) setLoading(false);
      }
    };
    load();
    return () => { cancelled = true; };
  }, [runId]);

  // Connect SSE for real-time updates
  useEffect(() => {
    const handleEvent = (type, data) => {
      if (type === 'snapshot') {
        setRunData(prev => ({ ...prev, ...data }));
        setActiveRun(runId, { status: data.status, progress_pct: data.progress_pct, step: data.current_step });
      } else if (type === 'step_start' || type === 'step_done' || type === 'step_error') {
        // Re-fetch status for accurate step data
        api(`/status/${runId}`).then(d => {
          setRunData(d);
          setActiveRun(runId, { status: d.status, progress_pct: d.progress_pct, step: d.current_step });
        }).catch(() => {});
      } else if (type === 'log') {
        const entry = { time: data.timestamp || new Date().toISOString(), message: data.message || JSON.stringify(data) };
        setLogs(prev => [...prev.slice(-500), entry]);
      } else if (type === 'pipeline_done') {
        api(`/status/${runId}`).then(d => {
          setRunData(d);
          setActiveRun(runId, { status: d.status, progress_pct: 100 });
          if (d.status === 'SUCCEEDED') {
             const pt = getPipelineType(d);
             const ptLabel = PIPELINE_TYPE_META[pt]?.label || 'Pipeline';
             addNotification('success', `${ptLabel} generation complete`);
           } else if (d.status === 'FAILED') {
            addNotification('error', `Pipeline failed at ${d.current_step || 'unknown step'}`);
          }
        }).catch(() => {});
      }
    };
    connectSSE(runId, handleEvent);
    return () => disconnectSSE(runId);
  }, [runId]);

  // Load outputs when pipeline succeeds
  useEffect(() => {
    if (runData?.status === 'SUCCEEDED' && !outputs) {
      api(`/outputs/${runId}`).then(setOutputs).catch(() => {});
    }
  }, [runData?.status]);

  // Auto-scroll logs
  useEffect(() => {
    if (logRef.current && logsOpen) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [logs, logsOpen]);

  const handleResume = async () => {
    try {
      const res = await api('/resume', { method: 'POST', body: JSON.stringify({ run_id: runId }) });
      addNotification('info', `Resuming from ${res.resume_from || 'auto-detected step'}`);
      navigate(`#/run/${res.run_id}`);
    } catch (err) {
      addNotification('error', `Resume failed: ${err.error || 'Unknown error'}`);
    }
  };

  if (loading) {
    return (
      <div className="p-6">
        <Skeleton className="h-8 w-64 mb-4" />
        <Skeleton className="h-4 w-48 mb-8" />
        {[1,2,3,4,5].map(i => <div key={i} className="flex gap-4 mb-4"><Skeleton className="w-8 h-8 rounded-full" /><Skeleton className="h-8 flex-1" /></div>)}
      </div>
    );
  }

  if (!runData) {
    return <div className="p-6 text-center"><p className="text-text-muted">Run not found</p><button onClick={() => navigate('#/channels')} className="mt-4 text-accent-blue hover:underline text-sm">← Back to channels</button></div>;
  }

  const statusBadge = {
    RUNNING: <Badge color="bg-accent-cyan/10 text-accent-cyan border-accent-cyan/30"><span className="pulse-dot mr-1.5 inline-block w-1.5 h-1.5 rounded-full bg-accent-cyan" /> RUNNING</Badge>,
    SUCCEEDED: <Badge color="bg-accent-green/10 text-accent-green border-accent-green/30">✅ COMPLETE</Badge>,
    FAILED: <Badge color="bg-accent-red/10 text-accent-red border-accent-red/30">✖ FAILED</Badge>,
  };

  return (
    <div className="p-4 md:p-6 max-w-4xl">
      <button onClick={() => navigate('#/channels')} className="text-sm text-text-muted hover:text-text-primary mb-4 inline-flex items-center gap-1 transition-colors">← Back</button>

      <div className="border border-border rounded-2xl bg-surface p-5 mb-6">
        <div className="flex flex-col md:flex-row md:items-start justify-between gap-4">
          <div>
            <div className="flex items-center gap-3 mb-1 flex-wrap">
              <h1 className="text-lg font-bold text-text-primary">Pipeline Run</h1>
              {statusBadge[runData.status] || <Badge>{runData.status}</Badge>}
              {(() => { const pt = getPipelineType(runData); const meta = PIPELINE_TYPE_META[pt]; return meta ? <Badge color={meta.badge}>{meta.icon} {meta.label}</Badge> : null; })()}
            </div>
            <div className="space-y-1 text-sm">
              <p className="text-text-muted">Run ID: <span className="font-mono text-accent-cyan">{runId}</span><CopyButton text={runId} /></p>
              {runData.start_date && <p className="text-text-muted">Started: {timeAgo(runData.start_date)}{runData.elapsed_sec ? ` · ${fmtDuration(runData.elapsed_sec)} elapsed` : ''}</p>}
            </div>
          </div>
          {runData.status === 'FAILED' && (
            <button onClick={handleResume} className="px-4 py-2 rounded-xl text-xs font-semibold text-white hover:opacity-90 transition-opacity shrink-0" style={{ background: 'linear-gradient(135deg, #4F6EF7, #8B5CF6)' }}>
              🔄 Resume Run
            </button>
          )}
        </div>
        {runData.status === 'RUNNING' && <ProgressBar pct={runData.progress_pct || 0} animated className="mt-4" />}
      </div>

      <div className="border border-border rounded-2xl bg-surface p-5 mb-6">
        <div className="flex items-center justify-between mb-4">
          <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest">Pipeline Steps</h3>
          {(() => { const pt = getPipelineType(runData); const meta = PIPELINE_TYPE_META[pt]; return meta ? <Badge color={meta.badge}>{meta.icon} {meta.label}</Badge> : null; })()}
        </div>
        <div className="space-y-0">
          {getPipelineSteps(getPipelineType(runData)).filter(s => !s.hidden).map((step, idx) => {
            const stepData = (runData.steps || []).find(s => s.name === step.id);
            const status = stepData?.status || 'pending';
            const isParallel = step.type === 'parallel';
            return (
              <div key={step.id} className="relative">
                {idx > 0 && <div className="absolute left-[15px] -top-2 w-0.5 h-4 bg-border" />}
                <StepRow step={step} stepData={stepData} status={status} allSteps={runData.steps || []} onResume={handleResume} />
                {isParallel && step.substeps && (
                  <div className="ml-8 pl-4 border-l border-border/50 space-y-1 mb-2">
                    {step.substeps.map(sub => {
                      const subData = (runData.steps || []).find(s => s.name === sub);
                      const subStatus = subData?.status || (status === 'done' ? 'done' : 'pending');
                      const isShorts = sub === 'Shorts';
                      const isSkipped = isShorts && subStatus === 'skipped';
                      return (
                        <div key={sub} className="flex items-center gap-3 py-1.5">
                          <span className="text-xs shrink-0">
                            {subStatus === 'done' ? '✅' : subStatus === 'running' ? '🔄' : subStatus === 'error' ? '✖' : isSkipped ? '⏭' : '○'}
                          </span>
                          <span className={`text-sm ${subStatus === 'done' ? 'text-text-primary' : subStatus === 'running' ? 'text-accent-blue' : subStatus === 'error' ? 'text-accent-red' : 'text-text-muted'}`}>
                            {sub}{isSkipped && ' (skipped)'}
                          </span>
                          {subData?.duration_sec && <span className="text-xs text-text-muted ml-auto">{fmtDuration(subData.duration_sec)}</span>}
                          {subData?.error && <span className="text-xs text-accent-red ml-auto truncate max-w-[200px]">{subData.error.message}</span>}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>

      <div className="border border-border rounded-2xl bg-surface mb-6 overflow-hidden">
        <button onClick={() => setLogsOpen(!logsOpen)} className="w-full flex items-center justify-between p-4 text-sm font-medium text-text-secondary hover:text-text-primary transition-colors">
          <span>Live Log Stream ({logs.length})</span>
          <span className="text-xs">{logsOpen ? '▲' : '▼'}</span>
        </button>
        {logsOpen && (
          <div ref={logRef} className="max-h-64 overflow-y-auto px-4 pb-4 font-mono text-xs leading-relaxed" style={{ background: '#06060C', color: '#22D3EE' }}>
            {logs.length === 0 && <p className="text-text-muted py-4 text-center font-sans">Waiting for log events...</p>}
            {logs.map((l, i) => (
              <div key={i} className="py-0.5 break-all">
                <span className="text-text-muted">[{new Date(l.time).toLocaleTimeString()}]</span> {l.message}
              </div>
            ))}
          </div>
        )}
      </div>

      {runData.status === 'SUCCEEDED' && <OutputsPanel outputs={outputs} runId={runId} runData={runData} />}
    </div>
  );
}

function StepRow({ step, stepData, status, allSteps, onResume }) {
  const icon = status === 'done' ? '✅' : status === 'running' ? '🔄' : status === 'error' ? '✖' : status === 'skipped' ? '⏭' : '○';
  const textColor = status === 'done' ? 'text-text-primary' : status === 'running' ? 'text-accent-blue' : status === 'error' ? 'text-accent-red' : 'text-text-muted';

  return (
    <div className="flex items-center gap-3 py-2.5">
      <span className={`w-8 h-8 rounded-full flex items-center justify-center text-sm shrink-0 ${status === 'running' ? 'bg-accent-blue/10' : status === 'done' ? 'bg-accent-green/10' : status === 'error' ? 'bg-accent-red/10' : 'bg-raised'}`}>
        {icon}
      </span>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2">
          <span className={`text-sm font-medium ${textColor}`}>{step.label}</span>
          {status === 'running' && <span className="pulse-dot w-1.5 h-1.5 rounded-full bg-accent-blue" />}
          {step.type === 'parallel' && <span className="text-[10px] text-text-muted bg-raised px-1.5 py-0.5 rounded">parallel</span>}
        </div>
        {stepData?.error && <p className="text-xs text-accent-red mt-0.5 truncate">{stepData.error.message || stepData.error.type}</p>}
      </div>
      {stepData?.duration_sec && <span className="text-xs text-text-muted font-mono shrink-0">{fmtDuration(stepData.duration_sec)}</span>}
      {status === 'error' && <button onClick={onResume} className="text-xs text-accent-blue hover:underline shrink-0">Resume</button>}
    </div>
  );
}

function OutputsPanel({ outputs, runId, runData }) {
  const { addNotification } = useContext(AppContext);
  if (!outputs) return null;

  const pipelineType = getPipelineType(runData);
  const urls = outputs.urls || {};
  const videoUrl = urls[`${runId}/final_video.mp4`] || urls[`${runId}/final_video_dry_run.mp4`] || urls[`${runId}/review/final_video.mp4`];
  const thumbUrls = [0,1,2].map(i => urls[`${runId}/thumbnails/thumbnail_${i}.jpg`]).filter(Boolean);
  const scriptUrl = urls[`${runId}/script.json`];
  const shortsManifestUrl = urls[`${runId}/shorts/manifest.json`];
  const showVideo = pipelineType === 'video' || pipelineType === 'combined';
  const showShorts = pipelineType === 'shorts' || pipelineType === 'combined';
  const meta = PIPELINE_TYPE_META[pipelineType] || PIPELINE_TYPE_META.combined;

  return (
    <div className="border border-border rounded-2xl bg-surface p-5">
      <div className="flex items-center justify-between mb-4">
        <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest">Outputs</h3>
        <Badge color={meta.badge}>{meta.icon} {meta.label}</Badge>
      </div>

      {showVideo && thumbUrls.length > 0 && (
        <div className="mb-4">
          <p className="text-[10px] text-text-muted uppercase tracking-widest mb-2">Thumbnails</p>
          <div className="flex gap-2 overflow-x-auto pb-2">
            {thumbUrls.map((url, i) => (
              <a key={i} href={url} target="_blank" className="shrink-0 border border-border rounded-lg overflow-hidden hover:border-border-bright transition-colors">
                <img src={url} alt={`Thumbnail ${i}`} className="h-20 w-auto object-cover" />
              </a>
            ))}
          </div>
        </div>
      )}

      {showVideo && videoUrl && (
        <div className="mb-4">
          <p className="text-[10px] text-text-muted uppercase tracking-widest mb-2">Final Video</p>
          <div className="flex gap-2 flex-wrap">
            <a href={videoUrl} target="_blank" className="px-4 py-2 rounded-xl text-xs font-medium text-accent-blue border border-accent-blue/30 bg-accent-blue/5 hover:bg-accent-blue/10 transition-colors">▶ Preview</a>
            <a href={videoUrl} download className="px-4 py-2 rounded-xl text-xs font-medium text-text-secondary border border-border hover:bg-raised transition-colors">↓ Download</a>
            {scriptUrl && <a href={scriptUrl} target="_blank" className="px-4 py-2 rounded-xl text-xs font-medium text-text-secondary border border-border hover:bg-raised transition-colors">📋 Script</a>}
          </div>
        </div>
      )}

      {showShorts && shortsManifestUrl && (
        <div className="mb-4">
          <p className="text-[10px] text-text-muted uppercase tracking-widest mb-2">Shorts</p>
          <a href={shortsManifestUrl} target="_blank" className="text-xs text-accent-cyan hover:underline">manifest.json ↓</a>
        </div>
      )}

      <div className="pt-4 border-t border-border/50">
        {showVideo ? (
          <>
            <button onClick={() => addNotification('info', 'Approve & Publish flow initiated — see scripts/approve_upload.py')}
              className="w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:opacity-90 transition-opacity" style={{ background: 'linear-gradient(135deg, #4F6EF7, #8B5CF6)' }}>
              🚀 Approve & Publish to YouTube
            </button>
            <p className="text-[10px] text-text-muted text-center mt-2">Triggers approve_upload.py flow — upload is a separate manual step</p>
          </>
        ) : (
          <>
            <button onClick={() => addNotification('info', 'Shorts download flow initiated')}
              className="w-full px-4 py-3 rounded-xl text-sm font-semibold text-white hover:opacity-90 transition-opacity" style={{ background: 'linear-gradient(135deg, #22D3EE, #06B6D4)' }}>
              ⚡ Download All Shorts
            </button>
            <p className="text-[10px] text-text-muted text-center mt-2">Download shorts for manual upload to YouTube Shorts, Reels, TikTok</p>
          </>
        )}
      </div>
    </div>
  );
}

// VIEW 6 — SYSTEM STATUS
// ═════════════════════════════════════════════════════════════════════════════
function SystemStatus() {
  const [health, setHealth] = useState(null);
  const [loading, setLoading] = useState(true);
  const [recentRuns, setRecentRuns] = useState([]);
  const { navigate } = useContext(AppContext);

  useEffect(() => {
    const load = async () => {
      setLoading(true);
      try {
        const data = await api('/health');
        setHealth(data);
      } catch { setHealth({ status: 'unreachable', checks: {} }); }
      try {
        const runsData = await api('/runs');
        setRecentRuns(runsData.runs || []);
      } catch {}
      finally { setLoading(false); }
    };
    load();
  }, []);

  const awsServices = [
    { name: 'Step Functions', key: 'step_functions' },
    { name: 'Lambda', key: 'lambda' },
    { name: 'Fargate / ECS', key: 'ecs' },
    { name: 'S3 (3 buckets)', key: 's3' },
    { name: 'Bedrock Claude', key: 'bedrock' },
    { name: 'Nova Canvas', key: 'nova_canvas' },
    { name: 'Nova Reel', key: 'nova_reel' },
    { name: 'MediaConvert', key: 'mediaconvert' },
  ];

  const externalAPIs = [
    { name: 'Perplexity API', key: 'perplexity' },
    { name: 'ElevenLabs', key: 'elevenlabs' },
    { name: 'Pexels', key: 'pexels' },
    { name: 'Pixabay', key: 'pixabay' },
    { name: 'Discord Webhook', key: 'discord' },
    { name: 'YouTube OAuth', key: 'youtube' },
    { name: 'PostgreSQL', key: 'postgresql' },
  ];

  const terraformModules = ['storage', 'secrets', 'networking', 'identity', 'compute', 'orchestration', 'api', 'observability'];

  if (loading) {
    return (
      <div className="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        {[1,2,3].map(i => <div key={i} className="border border-border rounded-2xl bg-surface p-5"><Skeleton className="h-5 w-32 mb-4" />{[1,2,3,4].map(j => <Skeleton key={j} className="h-4 w-full mb-2" />)}</div>)}
      </div>
    );
  }

  const checks = health?.checks || {};
  const getStatus = (key) => {
    const v = checks[key];
    if (v === 'ok' || v === 'healthy') return { icon: '✅', label: 'Healthy', color: 'text-accent-green' };
    if (v === 'warning') return { icon: '⚠️', label: 'Warning', color: 'text-accent-amber' };
    if (v === 'error') return { icon: '❌', label: 'Error', color: 'text-accent-red' };
    return { icon: '✅', label: 'OK', color: 'text-accent-green' };
  };

  return (
    <div className="p-4 md:p-6">
      <h1 className="text-lg font-bold text-text-primary mb-6">System Status</h1>

      <div className="flex items-center gap-3 mb-6 p-4 rounded-2xl border border-border bg-surface">
        <span className={`w-3 h-3 rounded-full ${health?.status === 'healthy' ? 'bg-accent-green' : health?.status === 'degraded' ? 'bg-accent-amber pulse-dot' : 'bg-accent-red'}`} />
        <span className="text-sm font-semibold text-text-primary capitalize">{health?.status || 'Unknown'}</span>
        <span className="text-xs text-text-muted ml-auto">Last checked: just now</span>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div className="border border-border rounded-2xl bg-surface p-5">
          <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest mb-4">AWS Services</h3>
          <div className="space-y-3">
            {awsServices.map(svc => {
              const s = getStatus(svc.key);
              return (
                <div key={svc.key} className="flex items-center justify-between">
                  <span className="text-sm text-text-secondary">{svc.name}</span>
                  <span className={`text-xs font-medium ${s.color}`}>{s.icon} {s.label}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="border border-border rounded-2xl bg-surface p-5">
          <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest mb-4">External APIs</h3>
          <div className="space-y-3">
            {externalAPIs.map(svc => {
              const s = getStatus(svc.key);
              return (
                <div key={svc.key} className="flex items-center justify-between">
                  <span className="text-sm text-text-secondary">{svc.name}</span>
                  <span className={`text-xs font-medium ${s.color}`}>{s.icon} {s.label}</span>
                </div>
              );
            })}
          </div>
        </div>

        <div className="border border-border rounded-2xl bg-surface p-5">
          <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest mb-4">Infrastructure</h3>
          <div className="mb-4">
            <p className="text-[10px] text-text-muted uppercase tracking-widest mb-2">Terraform Modules</p>
            <div className="flex flex-wrap gap-1.5">
              {terraformModules.map(m => (
                <span key={m} className="px-2 py-0.5 rounded bg-raised text-[10px] text-text-secondary font-mono">{m}</span>
              ))}
            </div>
          </div>
          <div className="space-y-2 text-sm">
            <div>
              <p className="text-[10px] text-text-muted uppercase tracking-widest mb-1">State Machine</p>
              <div className="flex items-center gap-1">
                <code className="text-xs text-accent-cyan font-mono">nexus-pipeline</code>
                <CopyButton text="nexus-pipeline" />
              </div>
            </div>
            <div>
              <p className="text-[10px] text-text-muted uppercase tracking-widest mb-1">Channel Setup</p>
              <div className="flex items-center gap-1">
                <code className="text-xs text-accent-cyan font-mono">nexus-channel-setup</code>
                <CopyButton text="nexus-channel-setup" />
              </div>
            </div>
            <div>
              <p className="text-[10px] text-text-muted uppercase tracking-widest mb-1">Dashboard CDN</p>
              <div className="flex items-center gap-1">
                <code className="text-xs text-accent-cyan font-mono">CloudFront</code>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="mt-6 border border-border rounded-2xl bg-surface p-5">
        <h3 className="text-[11px] font-medium text-text-muted uppercase tracking-widest mb-4">Recent Runs</h3>
        {recentRuns.length > 0 ? (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead><tr className="border-b border-border">
                <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-2 px-2">Run ID</th>
                <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-2 px-2 hidden md:table-cell">Channel</th>
                <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-2 px-2">Status</th>
                <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-2 px-2 hidden lg:table-cell">Duration</th>
                <th className="text-left text-[10px] text-text-muted uppercase tracking-widest py-2 px-2 hidden md:table-cell">Date</th>
              </tr></thead>
              <tbody>
                {recentRuns.map((r, i) => (
                  <tr key={i} className="border-b border-border/50 hover:bg-raised/30 transition-colors cursor-pointer" onClick={() => navigate(`#/run/${r.run_id}`)}>
                    <td className="py-2 px-2"><span className="font-mono text-xs text-accent-cyan">{(r.run_id || '').slice(0, 12)}</span></td>
                    <td className="py-2 px-2 hidden md:table-cell text-text-secondary text-xs">{r.channel || '—'}</td>
                    <td className="py-2 px-2"><Badge color={r.status === 'SUCCEEDED' ? 'bg-accent-green/10 text-accent-green border-accent-green/30' : r.status === 'FAILED' ? 'bg-accent-red/10 text-accent-red border-accent-red/30' : 'bg-accent-cyan/10 text-accent-cyan border-accent-cyan/30'}>{r.status || 'UNKNOWN'}</Badge></td>
                    <td className="py-2 px-2 hidden lg:table-cell text-text-muted text-xs">{r.elapsed_sec ? fmtDuration(r.elapsed_sec) : '—'}</td>
                    <td className="py-2 px-2 hidden md:table-cell text-text-muted text-xs">{r.start_date ? timeAgo(r.start_date) : '—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        ) : (
          <p className="text-sm text-text-muted text-center py-6">No recent runs available. Start a pipeline from a channel to see runs here.</p>
        )}
      </div>

      {health?.error_logs && Object.keys(health.error_logs).length > 0 && (
        <div className="mt-6 border border-accent-red/20 rounded-2xl bg-accent-red/5 p-5">
          <h3 className="text-[11px] font-medium text-accent-red uppercase tracking-widest mb-3">Recent Errors</h3>
          {Object.entries(health.error_logs).map(([step, err]) => (
            <div key={step} className="mb-2 text-sm">
              <span className="font-semibold text-accent-red">{step}:</span>
              <span className="text-text-secondary ml-2">{typeof err === 'string' ? err : JSON.stringify(err)}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// APP ROOT
// ═════════════════════════════════════════════════════════════════════════════
function App() {
  const router = useRouter();
  const { notifications, addNotification, removeNotification } = useNotifications();
  const sse = useSSE();

  const [channels, setChannels] = useState([]);
  const [channelsLoading, setChannelsLoading] = useState(true);
  const [activeRuns, setActiveRuns] = useState({});
  const [modal, setModal] = useState(null);
  const [drawer, setDrawer] = useState(null);
  const [modalChannel, setModalChannel] = useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);

  const setActiveRun = useCallback((runId, data) => {
    setActiveRuns(prev => ({ ...prev, [runId]: { ...prev[runId], ...data } }));
  }, []);

  const refreshChannels = useCallback(async () => {
    try {
      const data = await api('/channel/list');
      setChannels(data.channels || data || []);
    } catch {}
  }, []);

  // Load channels on mount
  useEffect(() => {
    const load = async () => {
      setChannelsLoading(true);
      try {
        const data = await api('/channel/list');
        setChannels(data.channels || data || []);
      } catch {}
      finally { setChannelsLoading(false); }
    };
    load();
  }, []);

  // Check SSE status periodically — try /health
  useEffect(() => {
    const check = () => {
      api('/health').then(() => {
        if (sse.sseStatus === 'unreachable') sse.setSseStatus('connected');
      }).catch(() => {
        if (sse.sseStatus === 'connected') sse.setSseStatus('unreachable');
      });
    };
    const interval = setInterval(check, 30000);
    return () => clearInterval(interval);
  }, [sse.sseStatus]);

  const ctx = {
    ...router,
    ...sse,
    channels, channelsLoading, refreshChannels,
    activeRuns, setActiveRun,
    modal, setModal, drawer, setDrawer,
    modalChannel, setModalChannel,
    notifications, addNotification, removeNotification,
  };

  const { match } = router;

  return (
    <AppContext.Provider value={ctx}>
      <div className="flex min-h-screen">
        <Sidebar collapsed={sidebarCollapsed} />
        <main className="flex-1 min-h-screen pb-20 md:pb-0">
          {match.view === 'channels' && <ChannelGrid />}
          {match.view === 'channelDetail' && <ChannelDetail channelId={match.id} />}
          {match.view === 'pipelineMonitor' && <PipelineMonitor runId={match.runId} />}
          {match.view === 'status' && <SystemStatus />}
          {!['channels', 'channelDetail', 'pipelineMonitor', 'status'].includes(match.view) && (
            <div className="flex flex-col items-center justify-center min-h-[70vh]">
              <p className="text-4xl mb-4">404</p>
              <p className="text-text-muted mb-4">Page not found</p>
              <button onClick={() => router.navigate('#/channels')} className="text-accent-blue hover:underline text-sm">← Back to channels</button>
            </div>
          )}
        </main>
        <MobileNav />
      </div>

      {drawer === 'create-channel' && <CreateChannelDrawer onClose={() => setDrawer(null)} />}
      {modal === 'generate-video' && modalChannel && <GenerateVideoModal channel={modalChannel} onClose={() => { setModal(null); setModalChannel(null); }} />}
      {modal === 'generate-shorts' && modalChannel && <GenerateShortsModal channel={modalChannel} onClose={() => { setModal(null); setModalChannel(null); }} />}
      <Toasts />
    </AppContext.Provider>
  );
}

// Mount
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
