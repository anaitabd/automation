<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus Cloud — Pipeline Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent-doc: #C8A96E;
      --accent-fin: #00A86B;
      --accent-ent: #FF3B30;
      --accent: var(--accent-doc);
      --mono: 'JetBrains Mono', 'Fira Mono', 'Courier New', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo { font-size: 22px; font-weight: 700; letter-spacing: 2px; color: var(--accent-doc); }
    .logo span { color: var(--text); font-weight: 400; }
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    section { margin-bottom: 40px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 3px;
         color: var(--muted); margin-bottom: 18px; }

    /* ── Input Form ─────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
    }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 6px;
            text-transform: uppercase; letter-spacing: 1px; }
    input[type=text] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    input[type=text]:focus { border-color: var(--accent-doc); }

    .profile-btns { display: flex; gap: 10px; }
    .profile-btn {
      flex: 1; padding: 10px 0; border: 1px solid var(--border);
      background: var(--bg); color: var(--muted); cursor: pointer;
      border-radius: 6px; font-family: var(--mono); font-size: 12px;
      letter-spacing: 1px; text-transform: uppercase; transition: all .2s;
    }
    .profile-btn.active-doc { border-color: var(--accent-doc); color: var(--accent-doc); }
    .profile-btn.active-fin { border-color: var(--accent-fin); color: var(--accent-fin); }
    .profile-btn.active-ent { border-color: var(--accent-ent); color: var(--accent-ent); }

    .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
    .toggle {
      appearance: none; width: 40px; height: 22px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 11px; cursor: pointer;
      position: relative; transition: background .2s;
    }
    .toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 14px; height: 14px; background: var(--muted);
      border-radius: 50%; transition: transform .2s;
    }
    .toggle:checked { background: var(--accent-fin); border-color: var(--accent-fin); }
    .toggle:checked::after { transform: translateX(18px); background: white; }

    .run-btn {
      width: 100%; padding: 14px; margin-top: 6px;
      background: var(--accent-doc); color: #000; border: none;
      border-radius: 6px; font-family: var(--mono); font-size: 14px;
      font-weight: 700; letter-spacing: 2px; cursor: pointer;
      text-transform: uppercase; transition: opacity .2s;
    }
    .run-btn:disabled { opacity: .5; cursor: not-allowed; }
    .run-btn.fin { background: var(--accent-fin); }
    .run-btn.ent { background: var(--accent-ent); color: #fff; }

    /* ── Pipeline Progress ──────────────────────────────────────── */
    .steps { display: flex; gap: 6px; flex-wrap: wrap; }
    .step {
      flex: 1; min-width: 100px; padding: 12px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; text-align: center; font-size: 11px;
      color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
      transition: all .3s; position: relative;
    }
    .step.active {
      border-color: var(--accent-doc); color: var(--accent-doc);
    }
    .step.active::after {
      content: '';
      position: absolute; inset: -1px; border-radius: 6px;
      border: 1px solid var(--accent-doc);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .step.done { border-color: var(--accent-fin); color: var(--accent-fin); }
    .step.error { border-color: var(--accent-ent); color: var(--accent-ent); }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .3; }
    }
    .step-icon { font-size: 18px; display: block; margin-bottom: 4px; }

    /* ── Outputs ────────────────────────────────────────────────── */
    .output-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media(max-width:768px) { .output-grid { grid-template-columns: 1fr; } }

    .video-wrapper video {
      width: 100%; border-radius: 6px; border: 1px solid var(--border);
    }

    .thumb-row { display: flex; gap: 10px; }
    .thumb-row img {
      flex: 1; border-radius: 6px; border: 2px solid var(--border);
      cursor: pointer; transition: border-color .2s;
    }
    .thumb-row img:hover { border-color: var(--accent-doc); }
    .thumb-row img.selected { border-color: var(--accent-fin); }

    .script-viewer {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 16px; font-size: 12px;
      max-height: 300px; overflow-y: auto; white-space: pre-wrap;
      color: var(--text); line-height: 1.7;
    }
    .copy-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .copy-btn {
      padding: 6px 14px; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 4px; font-family: var(--mono);
      font-size: 11px; cursor: pointer; letter-spacing: 1px;
    }
    .copy-btn:hover { border-color: var(--accent-doc); color: var(--accent-doc); }

    /* ── History ────────────────────────────────────────────────── */
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { text-align: left; color: var(--muted); padding: 8px 12px;
         border-bottom: 1px solid var(--border); text-transform: uppercase;
         letter-spacing: 1px; font-size: 11px; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    tr:hover td { background: var(--surface); }
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
      text-transform: uppercase; letter-spacing: 1px; font-weight: 700;
    }
    .badge-RUNNING { background: #1a2a1a; color: var(--accent-fin); }
    .badge-SUCCEEDED { background: #0a2a1a; color: var(--accent-fin); }
    .badge-FAILED { background: #2a0a0a; color: var(--accent-ent); }
    .badge-TIMED_OUT { background: #2a1a0a; color: #ffa500; }

    a { color: var(--accent-doc); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .error-msg { color: var(--accent-ent); font-size: 12px; margin-top: 8px; }
    .success-msg { color: var(--accent-fin); font-size: 12px; margin-top: 8px; }

    /* ── Overall Progress Bar ──────────────────────────────────── */
    .progress-bar-container {
      width: 100%; height: 8px; background: var(--surface2);
      border-radius: 4px; margin: 16px 0 8px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .progress-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent-fin), var(--accent-doc));
      transition: width 0.5s ease;
    }
    .progress-stats {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 11px; color: var(--muted); margin-bottom: 12px;
    }
    .progress-stats .highlight {
      color: var(--accent-doc); font-weight: 700; font-size: 13px;
    }
    .progress-stats .eta {
      color: var(--accent-fin); font-weight: 700;
    }

    /* ── Step Detail Cards ─────────────────────────────────────── */
    .step-detail {
      display: flex; align-items: center; gap: 10px;
      font-size: 11px; padding: 4px 0;
    }
    .step .step-time {
      display: block; margin-top: 4px; font-size: 10px;
      color: var(--muted); font-weight: 400;
    }
    .step.active .step-time { color: var(--accent-doc); }
    .step.done .step-time { color: var(--accent-fin); }
    .step.error .step-time { color: var(--accent-ent); }
    .step .step-progress-mini {
      width: 100%; height: 3px; background: var(--surface2);
      border-radius: 2px; margin-top: 4px; overflow: hidden;
    }
    .step .step-progress-mini .fill {
      height: 100%; border-radius: 2px; transition: width 0.3s;
    }
    .step.active .step-progress-mini .fill {
      background: var(--accent-doc);
      animation: indeterminate 1.5s ease-in-out infinite;
    }
    .step.done .step-progress-mini .fill { background: var(--accent-fin); width: 100% !important; }
    .step.error .step-progress-mini .fill { background: var(--accent-ent); }
    @keyframes indeterminate {
      0% { margin-left: 0; width: 30%; }
      50% { margin-left: 40%; width: 50%; }
      100% { margin-left: 100%; width: 0%; }
    }

    /* ── Elapsed Timer ─────────────────────────────────────────── */
    .timer-display {
      display: flex; align-items: center; gap: 16px; margin-top: 12px;
      padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; font-size: 12px;
    }
    .timer-display .timer-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
    .timer-display .timer-value { font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .timer-display .timer-elapsed { color: var(--text); }
    .timer-display .timer-eta { color: var(--accent-fin); }
    .timer-display .timer-separator { color: var(--border); font-size: 24px; }

    /* ── Log Entries with step indicator ────────────────────────── */
    .log-entry {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 2px 0; line-height: 1.6;
    }
    .log-entry .log-time {
      color: var(--muted); white-space: nowrap; min-width: 75px;
    }
    .log-entry .log-step-badge {
      padding: 1px 6px; border-radius: 3px; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap; background: var(--surface2);
      color: var(--muted); border: 1px solid var(--border);
      min-width: 70px; text-align: center;
    }
    .log-entry .log-msg { flex: 1; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ─── Config (set API_BASE to your API Gateway URL) ───────────────────────────
const API_BASE = window.__NEXUS_API_BASE__
  || ('%%NEXUS_API_BASE%%' !== '%%NEXUS_API' + '_BASE%%'
      ? '%%NEXUS_API_BASE%%'
      : (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
        ? `http://${window.location.host}/api`
        : 'https://your-api-gateway-url.execute-api.us-east-1.amazonaws.com/prod');
const IS_LOCAL = API_BASE.includes('localhost') || API_BASE.includes('127.0.0.1');

const STEPS = [
  { key: 'Research',  icon: '🔍', label: 'Research'  },
  { key: 'Script',    icon: '✍️', label: 'Script'    },
  { key: 'Audio',     icon: '🎙️', label: 'Audio'     },
  { key: 'Visuals',   icon: '🎬', label: 'Visuals'   },
  { key: 'Editor',    icon: '🎞️', label: 'Editor'    },
  { key: 'Thumbnail', icon: '🖼️', label: 'Thumbnail' },
  { key: 'Upload',    icon: '📤', label: 'Upload'    },
  { key: 'Notify',    icon: '🔔', label: 'Notify'    },
];

// ─── Helpers ─────────────────────────────────────────────────────────────────
async function apiPost(path, body) {
  const r = await fetch(`${API_BASE}${path}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return r.json();
}
async function apiGet(path) {
  const r = await fetch(`${API_BASE}${path}`);
  return r.json();
}
function copyToClipboard(text) {
  navigator.clipboard.writeText(text).catch(() => {});
}
function fmtDuration(sec) {
  if (sec == null || sec < 0) return '—';
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}m ${String(s).padStart(2, '0')}s`;
}
function fmtTimer(sec) {
  if (sec == null || sec < 0) return '00:00';
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [niche, setNiche] = React.useState('');
  const [profile, setProfile] = React.useState('documentary');
  const [dryRun, setDryRun] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [success, setSuccess] = React.useState('');

  const [runId, setRunId] = React.useState('');
  const [status, setStatus] = React.useState(null);   // { status, current_step }
  const [outputs, setOutputs] = React.useState(null); // { urls }
  const [script, setScript] = React.useState(null);
  const [logs, setLogs] = React.useState([]);          // live log entries
  const [progressPct, setProgressPct] = React.useState(0);
  const [etaRemaining, setEtaRemaining] = React.useState(null);
  const [pipelineElapsed, setPipelineElapsed] = React.useState(0);
  const [stepTimers, setStepTimers] = React.useState({}); // stepName -> {elapsed, estimated}
  const [pipelineStartTime, setPipelineStartTime] = React.useState(null);

  const [health, setHealth] = React.useState(null); // null=unknown, 'healthy', 'degraded', 'error'

  const [history, setHistory] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('nexus_history') || '[]'); }
    catch { return []; }
  });

  const [selectedThumb, setSelectedThumb] = React.useState(0);
  const pollerRef = React.useRef(null);
  const sseRef = React.useRef(null);
  const logEndRef = React.useRef(null);

  const accentClass = profile === 'finance' ? 'fin' : profile === 'entertainment' ? 'ent' : '';

  // Health check on mount
  React.useEffect(() => {
    apiGet('/health').then(h => {
      setHealth(h.status === 'healthy' ? 'healthy' : h.status === 'degraded' ? 'degraded' : 'error');
    }).catch(() => setHealth('error'));
  }, []);

  // Auto-scroll logs
  React.useEffect(() => {
    if (logEndRef.current) logEndRef.current.scrollIntoView({ behavior: 'smooth' });
  }, [logs]);

  // Live elapsed timer (ticks every second while running)
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    if (!pipelineStartTime || (status && ['SUCCEEDED','FAILED','TIMED_OUT','ABORTED'].includes(status.status))) return;
    const interval = setInterval(() => {
      setPipelineElapsed(Math.floor((Date.now() - pipelineStartTime) / 1000));
      setTick(t => t + 1); // force re-render for active step timer
    }, 1000);
    return () => clearInterval(interval);
  }, [pipelineStartTime, status]);

  // Poll or SSE based on mode
  React.useEffect(() => {
    if (!runId) return;
    setLogs([]);
    setProgressPct(0);
    setEtaRemaining(null);
    setPipelineElapsed(0);
    setStepTimers({});
    setPipelineStartTime(Date.now());

    // ── SSE mode (local orchestrator) ──
    if (IS_LOCAL) {
      if (sseRef.current) sseRef.current.close();
      const es = new EventSource(`${API_BASE}/events/${runId}`);
      sseRef.current = es;

      es.addEventListener('snapshot', (e) => {
        const data = JSON.parse(e.data);
        setStatus(data);
        if (data.elapsed_sec) setPipelineElapsed(data.elapsed_sec);
        if (data.eta_remaining_sec != null) setEtaRemaining(data.eta_remaining_sec);
        // Recover progress from snapshot
        if (data.steps) {
          const done = data.steps.filter(s => s.status === 'done').length;
          setProgressPct(Math.round((done / data.steps.length) * 100));
          const timers = {};
          data.steps.forEach(s => {
            timers[s.name] = { elapsed: s.elapsed_sec, estimated: s.estimated_duration_sec };
          });
          setStepTimers(timers);
        }
      });

      es.addEventListener('step_start', (e) => {
        const data = JSON.parse(e.data);
        setStatus(prev => prev ? { ...prev, current_step: data.step, current_step_index: data.index } : prev);
        setLogs(prev => [...prev, { time: data.timestamp, icon: '▶', msg: data.message, step: data.step }]);
        if (data.progress_pct != null) setProgressPct(data.progress_pct);
        if (data.eta_remaining_sec != null) setEtaRemaining(data.eta_remaining_sec);
        if (data.pipeline_elapsed_sec != null) setPipelineElapsed(data.pipeline_elapsed_sec);
        setStepTimers(prev => ({
          ...prev,
          [data.step]: { elapsed: null, estimated: data.estimated_duration_sec, startedAt: Date.now() }
        }));
      });

      es.addEventListener('step_done', (e) => {
        const data = JSON.parse(e.data);
        setLogs(prev => [...prev, { time: data.timestamp, icon: '✅', msg: data.message, step: data.step }]);
        if (data.progress_pct != null) setProgressPct(data.progress_pct);
        if (data.eta_remaining_sec != null) setEtaRemaining(data.eta_remaining_sec);
        if (data.pipeline_elapsed_sec != null) setPipelineElapsed(data.pipeline_elapsed_sec);
        setStepTimers(prev => ({
          ...prev,
          [data.step]: { ...prev[data.step], elapsed: data.elapsed_sec }
        }));
        // Refresh full status
        apiGet(`/status/${runId}`).then(s => { if (s) setStatus(s); }).catch(() => {});
      });

      es.addEventListener('step_error', (e) => {
        const data = JSON.parse(e.data);
        setLogs(prev => [...prev, { time: data.timestamp, icon: '❌', msg: data.message, step: data.step }]);
        if (data.progress_pct != null) setProgressPct(data.progress_pct);
        if (data.pipeline_elapsed_sec != null) setPipelineElapsed(data.pipeline_elapsed_sec);
        setEtaRemaining(0);
        apiGet(`/status/${runId}`).then(s => { if (s) setStatus(s); }).catch(() => {});
      });

      es.addEventListener('log', (e) => {
        const data = JSON.parse(e.data);
        setLogs(prev => [...prev, { time: data.timestamp, icon: '📋', msg: data.message, step: data.step }]);
      });

      es.addEventListener('pipeline_done', (e) => {
        const data = JSON.parse(e.data);
        const totalStr = data.total_elapsed_sec ? ` in ${fmtDuration(data.total_elapsed_sec)}` : '';
        setLogs(prev => [...prev, {
          time: data.timestamp || new Date().toISOString(),
          icon: data.status === 'SUCCEEDED' ? '🎉' : '💥',
          msg: `Pipeline ${data.status}${totalStr}` + (data.title ? ` — ${data.title}` : ''),
          step: 'Pipeline',
        }]);
        if (data.total_elapsed_sec) setPipelineElapsed(data.total_elapsed_sec);
        setProgressPct(data.status === 'SUCCEEDED' ? 100 : progressPct);
        setEtaRemaining(0);
        apiGet(`/status/${runId}`).then(s => { if (s) setStatus(s); }).catch(() => {});
        es.close();
      });

      es.onerror = () => {
        // SSE closed or errored — do a final status fetch
        apiGet(`/status/${runId}`).then(s => { if (s) setStatus(s); }).catch(() => {});
      };

      return () => es.close();
    }

    // ── Polling mode (cloud / API Gateway) ──
    pollerRef.current = setInterval(async () => {
      const s = await apiGet(`/status/${runId}`).catch(() => null);
      if (!s) return;
      setStatus(s);

      // Populate step timers from API response
      if (s.steps) {
        const done = s.steps.filter(x => x.status === 'done').length;
        const errored = s.steps.filter(x => x.status === 'error').length;
        setProgressPct(s.progress_pct ?? Math.round(((done + errored) / s.steps.length) * 100));
        const timers = {};
        s.steps.forEach(st => {
          timers[st.name] = {
            elapsed: st.duration_sec,
            estimated: null,
            startedAt: st.status === 'running' && st.entered_at ? new Date(st.entered_at).getTime() : null,
          };
        });
        setStepTimers(timers);
      }

      // Build log entries from timeline
      if (s.timeline && s.timeline.length > 0) {
        const newLogs = s.timeline.map(t => ({
          time: t.time,
          step: t.step,
          icon: t.event === 'completed' ? '✅' : t.event === 'failed' ? '❌' : '▶',
          msg: t.message,
        }));
        setLogs(newLogs);
      }

      if (s.elapsed_sec) setPipelineElapsed(s.elapsed_sec);

      if (s.status === 'SUCCEEDED' || s.status === 'FAILED') {
        clearInterval(pollerRef.current);
        setEtaRemaining(0);
        if (s.status === 'SUCCEEDED') setProgressPct(100);
        // Add final log entry
        setLogs(prev => [...prev, {
          time: s.stop_date || new Date().toISOString(),
          step: 'Pipeline',
          icon: s.status === 'SUCCEEDED' ? '🎉' : '💥',
          msg: `Pipeline ${s.status}` + (s.elapsed_sec ? ` in ${fmtDuration(s.elapsed_sec)}` : ''),
        }]);
        // Fetch outputs (for both success and failure - to get error logs)
        const o = await apiGet(`/outputs/${runId}`).catch(() => null);
        if (o) {
          setOutputs(o);
          if (o.urls?.[`${runId}/script.json`]) {
            fetch(o.urls[`${runId}/script.json`])
              .then(r => r.json())
              .then(setScript)
              .catch(() => {});
          }
        }
      }
    }, 4000);
    return () => clearInterval(pollerRef.current);
  }, [runId]);

  async function handleRun() {
    if (!niche.trim()) { setError('Enter a niche keyword'); return; }
    setError(''); setSuccess('');
    setLoading(true);
    setStatus(null); setOutputs(null); setScript(null); setLogs([]);
    setProgressPct(0); setEtaRemaining(null); setPipelineElapsed(0);
    setStepTimers({}); setPipelineStartTime(null);
    try {
      const res = await apiPost('/run', { niche, profile, dry_run: dryRun });
      if (res.error) { setError(res.error); return; }
      setRunId(res.run_id);
      const newEntry = {
        run_id: res.run_id, niche, profile, dry_run: dryRun,
        status: 'RUNNING', title: '', video_url: '', start: new Date().toISOString(),
      };
      const updated = [newEntry, ...history].slice(0, 10);
      setHistory(updated);
      localStorage.setItem('nexus_history', JSON.stringify(updated));
      setSuccess(`Pipeline started. Run ID: ${res.run_id}`);
    } catch(e) {
      setError(String(e));
    } finally {
      setLoading(false);
    }
  }

  // Update history entry when status changes
  React.useEffect(() => {
    if (!runId || !status) return;
    setHistory(prev => {
      const updated = prev.map(h =>
        h.run_id === runId
          ? { ...h, status: status.status, title: status.title || h.title }
          : h
      );
      localStorage.setItem('nexus_history', JSON.stringify(updated));
      return updated;
    });
  }, [status]);

  function stepState(stepKey) {
    if (!status) return '';
    // Use steps[] array (works for both local and cloud mode)
    if (status.steps) {
      const s = status.steps.find(x => x.name === stepKey);
      if (!s) return '';
      if (s.status === 'done') return 'done';
      if (s.status === 'running') return 'active';
      if (s.status === 'error') return 'error';
      return '';
    }
    // Fallback: infer from current_step position
    const current = status.current_step || '';
    const stepIdx = STEPS.findIndex(s => s.key === stepKey);
    const currentIdx = STEPS.findIndex(s => s.key === current);
    if (status.status === 'FAILED' && stepIdx === currentIdx) return 'error';
    if (stepIdx < currentIdx) return 'done';
    if (stepIdx === currentIdx) return 'active';
    return '';
  }

  const videoUrl = outputs?.urls?.[`${runId}/final_video.mp4`];
  const thumbUrls = [0, 1, 2].map(i => outputs?.urls?.[`${runId}/thumbnails/thumbnail_${i}.jpg`]).filter(Boolean);

  return (
    <div>
      <header>
        <div className="logo">NEXUS<span> CLOUD</span></div>
        {IS_LOCAL && (
          <span style={{
            background:'#1a2a1a', color:'var(--accent-fin)', padding:'3px 10px',
            borderRadius:4, fontSize:10, letterSpacing:2, fontWeight:700,
          }}>🔧 LOCAL</span>
        )}
        <div style={{fontSize:11,color:'var(--muted)',marginLeft:'auto',display:'flex',alignItems:'center',gap:12}}>
          {IS_LOCAL ? 'Local Docker Orchestrator' : 'Serverless YouTube Automation Pipeline'}
          {health && (
            <span style={{
              display:'inline-flex', alignItems:'center', gap:5, padding:'3px 10px',
              borderRadius:4, fontSize:10, letterSpacing:1, fontWeight:700,
              background: health === 'healthy' ? '#0a2a1a' : health === 'degraded' ? '#2a1a0a' : '#2a0a0a',
              color: health === 'healthy' ? 'var(--accent-fin)' : health === 'degraded' ? '#ffa500' : 'var(--accent-ent)',
              border: `1px solid ${health === 'healthy' ? 'var(--accent-fin)' : health === 'degraded' ? '#ffa500' : 'var(--accent-ent)'}`,
            }}>
              {health === 'healthy' ? '● DEPLOY OK' : health === 'degraded' ? '● DEGRADED' : '● UNREACHABLE'}
            </span>
          )}
        </div>
      </header>

      <main>
        {/* ── Input Form ── */}
        <section>
          <h2>New Pipeline Run</h2>
          <div className="card">
            <div className="field">
              <label>Niche Keyword</label>
              <input
                type="text"
                value={niche}
                onChange={e => setNiche(e.target.value)}
                placeholder="e.g. obscure history, stock market, true crime..."
                onKeyDown={e => e.key === 'Enter' && handleRun()}
              />
            </div>
            <div className="field">
              <label>Channel Profile</label>
              <div className="profile-btns">
                {['documentary', 'finance', 'entertainment'].map(p => (
                  <button
                    key={p}
                    className={`profile-btn ${profile === p ? `active-${p.slice(0,3)}` : ''}`}
                    onClick={() => setProfile(p)}
                  >{p.charAt(0).toUpperCase() + p.slice(1)}</button>
                ))}
              </div>
            </div>
            <div className="field">
              <div className="toggle-row">
                <input
                  type="checkbox" className="toggle" id="dry"
                  checked={dryRun} onChange={e => setDryRun(e.target.checked)}
                />
                <label htmlFor="dry" style={{marginBottom:0,textTransform:'none',letterSpacing:0,fontSize:13}}>
                  Dry Run (no AI calls, no real uploads)
                </label>
              </div>
            </div>
            <button
              className={`run-btn ${accentClass}`}
              onClick={handleRun}
              disabled={loading}
            >
              {loading ? '⏳  Starting...' : '▶  Run Pipeline'}
            </button>
            {error && <div className="error-msg">⚠ {error}</div>}
            {success && <div className="success-msg">✔ {success}</div>}
          </div>
        </section>

        {/* ── Pipeline Progress ── */}
        {runId && (
          <section>
            <h2>Pipeline Progress {status && `— ${status.status}`}</h2>

            {/* Overall progress bar */}
            <div className="progress-bar-container">
              <div className="progress-bar-fill" style={{width: `${progressPct}%`}} />
            </div>
            <div className="progress-stats">
              <span><span className="highlight">{progressPct}%</span> complete</span>
              <span>
                {status && status.current_step_index != null && status.total_steps
                  ? `Step ${Math.min(status.current_step_index + 1, status.total_steps)} of ${status.total_steps}`
                  : ''}
              </span>
              <span>ETA: <span className="eta">{etaRemaining != null && etaRemaining > 0 ? fmtDuration(etaRemaining) : etaRemaining === 0 ? 'Done' : '—'}</span></span>
            </div>

            {/* Timer display */}
            <div className="timer-display">
              <div>
                <div className="timer-label">Elapsed</div>
                <div className="timer-value timer-elapsed">{fmtTimer(pipelineElapsed)}</div>
              </div>
              <div className="timer-separator">│</div>
              <div>
                <div className="timer-label">Remaining</div>
                <div className="timer-value timer-eta">
                  {etaRemaining != null && etaRemaining > 0 ? fmtTimer(etaRemaining) : etaRemaining === 0 ? '00:00' : '--:--'}
                </div>
              </div>
              <div className="timer-separator">│</div>
              <div>
                <div className="timer-label">Current Step</div>
                <div className="timer-value" style={{fontSize:14,color:'var(--accent-doc)'}}>
                  {status?.current_step || '—'}
                </div>
              </div>
            </div>

            {/* Steps with mini progress & timing */}
            <div className="steps" style={{marginTop: 16}}>
              {STEPS.map(s => {
                const st = stepState(s.key);
                const timer = stepTimers[s.key];
                let timeLabel = '';
                if (st === 'done' && timer?.elapsed != null) {
                  timeLabel = fmtDuration(timer.elapsed);
                } else if (st === 'active' && timer?.startedAt) {
                  // Live counting
                  const live = Math.floor((Date.now() - timer.startedAt) / 1000);
                  timeLabel = `${fmtTimer(live)}`;
                  if (timer?.estimated) timeLabel += ` / ~${fmtDuration(timer.estimated)}`;
                } else if (timer?.estimated) {
                  timeLabel = `~${fmtDuration(timer.estimated)}`;
                }
                return (
                  <div key={s.key} className={`step ${st}`}>
                    <span className="step-icon">{s.icon}</span>
                    {s.label}
                    <span className="step-time">{timeLabel}</span>
                    <div className="step-progress-mini">
                      <div className="fill" style={{
                        width: st === 'done' ? '100%' : st === 'active' ? '50%' : '0%'
                      }} />
                    </div>
                  </div>
                );
              })}
            </div>
            {runId && (
              <p style={{marginTop:10,fontSize:11,color:'var(--muted)'}}>
                Run ID: <code style={{color:'var(--text)'}}>{runId}</code>
              </p>
            )}

            {/* ── Live Logs (both local and cloud mode) ── */}
            {logs.length > 0 && (
              <div style={{
                marginTop:16, background:'var(--bg)', border:'1px solid var(--border)',
                borderRadius:6, padding:'12px 16px', maxHeight:300, overflowY:'auto',
                fontSize:12, lineHeight:1.8, fontFamily:'var(--mono)',
              }}>
                {logs.map((l, i) => (
                  <div key={i} className="log-entry" style={{
                    color: l.icon === '❌' || l.icon === '💥' ? 'var(--accent-ent)'
                         : l.icon === '✅' || l.icon === '🎉' ? 'var(--accent-fin)'
                         : 'var(--text)'
                  }}>
                    <span className="log-time">
                      {new Date(l.time).toLocaleTimeString()}
                    </span>
                    {l.step && <span className="log-step-badge">{l.step}</span>}
                    <span className="log-msg">{l.icon} {l.msg}</span>
                  </div>
                ))}
                <div ref={logEndRef} />
              </div>
            )}

            {/* ── Error Detail Panel ── */}
            {status && status.error && status.status === 'FAILED' && (
              <div style={{
                marginTop:16, background:'#1a0a0a', border:'1px solid var(--accent-ent)',
                borderRadius:6, padding:'16px 20px',
              }}>
                <div style={{
                  fontSize:13, fontWeight:700, color:'var(--accent-ent)',
                  marginBottom:10, display:'flex', alignItems:'center', gap:8,
                }}>
                  <span style={{fontSize:18}}>⚠️</span>
                  Pipeline Failed
                  {status.error.step && (
                    <span style={{
                      fontSize:10, background:'var(--accent-ent)', color:'#fff',
                      padding:'2px 8px', borderRadius:3, marginLeft:6,
                    }}>at {status.error.step}</span>
                  )}
                </div>
                {status.error.step_error && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11, color:'var(--muted)', marginBottom:4}}>ERROR TYPE</div>
                    <code style={{
                      color:'var(--accent-ent)', fontSize:12,
                      background:'var(--surface2)', padding:'4px 8px', borderRadius:4,
                    }}>{status.error.step_error.type}</code>
                  </div>
                )}
                {status.error.step_error?.message && (
                  <div style={{marginBottom:10}}>
                    <div style={{fontSize:11, color:'var(--muted)', marginBottom:4}}>MESSAGE</div>
                    <div style={{
                      fontSize:12, color:'var(--text)', lineHeight:1.6,
                      background:'var(--surface)', padding:'10px 12px', borderRadius:4,
                      maxHeight:120, overflowY:'auto', wordBreak:'break-word',
                    }}>{status.error.step_error.message}</div>
                  </div>
                )}
                {status.error.step_error?.stack_trace && (
                  <div>
                    <div style={{fontSize:11, color:'var(--muted)', marginBottom:4}}>STACK TRACE</div>
                    <pre style={{
                      fontSize:11, color:'#ccc', lineHeight:1.5,
                      background:'var(--bg)', padding:'10px 12px', borderRadius:4,
                      maxHeight:200, overflowY:'auto', whiteSpace:'pre-wrap', wordBreak:'break-all',
                      border:'1px solid var(--border)',
                    }}>{status.error.step_error.stack_trace}</pre>
                  </div>
                )}
                {status.error.cause && !status.error.step_error && (
                  <div style={{
                    fontSize:12, color:'var(--text)', lineHeight:1.6,
                    background:'var(--surface)', padding:'10px 12px', borderRadius:4,
                    maxHeight:120, overflowY:'auto', wordBreak:'break-word',
                  }}>{status.error.cause}</div>
                )}
              </div>
            )}

            {/* ── Error Logs from S3 ── */}
            {outputs?.error_logs && Object.keys(outputs.error_logs).length > 0 && (
              <div style={{marginTop:16}}>
                <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:2}}>
                  Error Logs from S3
                </div>
                {Object.entries(outputs.error_logs).map(([step, data]) => (
                  <div key={step} style={{
                    background:'var(--surface)', border:'1px solid var(--border)',
                    borderRadius:6, padding:'10px 14px', marginBottom:8, fontSize:12,
                  }}>
                    <span style={{color:'var(--accent-ent)', fontWeight:700}}>
                      {step}:
                    </span>{' '}
                    <span style={{color:'var(--text)'}}>
                      {typeof data === 'object' ? (data.error || JSON.stringify(data)) : String(data)}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </section>
        )}

        {/* ── Outputs ── */}
        {outputs && (
          <section>
            <h2>Outputs</h2>
            <div className="output-grid">
              {/* Video */}
              <div>
                <h2 style={{marginBottom:10}}>Final Video</h2>
                {videoUrl
                  ? <div className="video-wrapper"><video src={videoUrl} controls /></div>
                  : <div className="card" style={{textAlign:'center',color:'var(--muted)',padding:40}}>
                      Video not yet available
                    </div>
                }
              </div>
              {/* Thumbnails */}
              <div>
                <h2 style={{marginBottom:10}}>Thumbnails</h2>
                <div className="thumb-row">
                  {thumbUrls.length > 0
                    ? thumbUrls.map((u, i) => (
                        <img key={i} src={u} alt={`Thumbnail ${i+1}`}
                          className={selectedThumb === i ? 'selected' : ''}
                          onClick={() => setSelectedThumb(i)} />
                      ))
                    : <div className="card" style={{flex:1,textAlign:'center',color:'var(--muted)',padding:40}}>
                        No thumbnails yet
                      </div>
                  }
                </div>
              </div>
            </div>

            {/* Script viewer */}
            {script && (
              <div style={{marginTop:24}}>
                <h2 style={{marginBottom:10}}>Script</h2>
                <div className="card">
                  <div style={{marginBottom:12}}>
                    <strong>{script.title}</strong>
                    <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>
                      {script.total_duration_estimate ? fmtDuration(script.total_duration_estimate) : ''}
                      {' '}&bull;{' '}{(script.tags||[]).join(', ')}
                    </div>
                  </div>
                  <div className="script-viewer">
                    {(script.sections || []).map((s, i) => (
                      <div key={i} style={{marginBottom:16}}>
                        <div style={{color:'var(--accent-doc)',marginBottom:4,fontSize:11}}>
                          ── {s.title} ──
                        </div>
                        {s.content}
                      </div>
                    ))}
                  </div>
                  <div className="copy-row">
                    <button className="copy-btn" onClick={() => copyToClipboard(script.title)}>
                      📋 Copy Title
                    </button>
                    <button className="copy-btn" onClick={() => copyToClipboard(script.description || '')}>
                      📋 Copy Description
                    </button>
                    <button className="copy-btn" onClick={() => copyToClipboard((script.tags||[]).join(', '))}>
                      📋 Copy Tags
                    </button>
                    <button className="copy-btn" onClick={() => copyToClipboard(JSON.stringify(script, null, 2))}>
                      📋 Copy Full JSON
                    </button>
                  </div>
                </div>
              </div>
            )}
          </section>
        )}

        {/* ── History ── */}
        {history.length > 0 && (
          <section>
            <h2>Run History (last 10)</h2>
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              <table>
                <thead>
                  <tr>
                    <th>Run ID</th>
                    <th>Niche</th>
                    <th>Profile</th>
                    <th>Status</th>
                    <th>Started</th>
                  </tr>
                </thead>
                <tbody>
                  {history.map(h => (
                    <tr key={h.run_id} style={{cursor:'pointer'}}
                      onClick={() => setRunId(h.run_id)}>
                      <td>
                        <code style={{fontSize:10}}>{h.run_id.slice(0,8)}…</code>
                        {h.dry_run && <span style={{marginLeft:6,fontSize:10,color:'var(--muted)'}}>[dry]</span>}
                      </td>
                      <td>{h.niche}</td>
                      <td>{h.profile}</td>
                      <td>
                        <span className={`status-badge badge-${h.status || 'RUNNING'}`}>
                          {h.status || 'RUNNING'}
                        </span>
                      </td>
                      <td style={{color:'var(--muted)'}}>
                        {h.start ? new Date(h.start).toLocaleString() : '—'}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </section>
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
